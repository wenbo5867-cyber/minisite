<body>
<header class="main-header">

            <span data-i18n="nav.deep"></span>
          </a>
        </li>

      </ul>
    </nav>

    <button id="langSwitch">EN</button>
  </div>
</header>

<div class="dropdown-container">

  <div class="dropdown-menu" id="analysis-dropdown">
    <div class="dropdown-item" data-action="videoRecognition" data-i18n="dropdown.recognition"></div>
    <div class="dropdown-item" data-action="idSingle" data-i18n="dropdown.idSingle"></div>
    <div class="dropdown-item" data-action="idAll" data-i18n="dropdown.idAll"></div>
  </div>

    <div class="dropdown-menu" id="deep-dropdown">
      <div class="dropdown-item" data-action="Image_analysis" data-i18n="dropdown.Image_analysis" id="Image_analysisSection"></div>
      <div class="dropdown-item" data-action="sampen" data-i18n="dropdown.sampen"></div>
      <div class="dropdown-item" data-action="rqa" data-i18n="dropdown.rqa"></div>
    </div>

</div>

<main class="main-content" style="padding: 20px;">
    <section >
        <h2>Multi-joint Sample Entropy Calculation</h2>
        <div >
            <label>Select Excel File：</label>
            <input type="file" id="fileInput" name="fileInput" accept=".xlsx,.xls" onchange="loadSheetNames()" >
        </div>

        <div >
            <label>Sheet：</label>
            <select id="sheetSelect"></select>
        </div>

        <div>
            <label>Embedding Dimension m：</label>
            <input id="m" type="number" value="2">
            <label>Delay tau：</label>
            <input id="tau" type="number" value="15">
            <label>r_ratio：</label>
            <input id="r_ratio" type="number" value="0.2" step="0.01">

            <br><br>
            <label>Apply Low-pass Filter：</label>
            <input id="applyFilter" type="checkbox" checked>
            <label>Sampling Frequency fs（Hz）：</label>
            <input id="fs" type="number" value="60">
            <label>Cutoff Frequency fc（Hz）：</label>
            <input id="fc" type="number" value="5">
        </div>

        <button onclick="processSelectedSheet()">Start Calculation</button>

        <h3>Result Output</h3>
        <pre id="log"></pre>

        <div id="plot" style="width:800px;height:500px;"></div>
    </section>
</main>


<script>
const i18n = {
  en: {
    nav: {
      analysis: "Data Analysis",
      deep: "In-depth Analysis"
    },
    dropdown: {
      recognition: "Video Recognition",
      idSingle: "Each ID Point's X and Y Analysis",
      idAll: "All ID Point's X and Y Analysis(Overall)",
      heatmap: "Heat Map",
      sampen: "Sample Entropy",
      Image_analysis: "Image Analysis",
      rqa: "RQA"
    },
  },
  zh: {
    nav: {
      analysis: "数据分析",
      deep: "深度分析"
    },
    dropdown: {
      recognition: "视频识别",
      idSingle: "每个ID点的X和Y分析结果",
      idAll: "所有ID点的X和Y分析结果(总图)",
      heatmap: "热力图",
      sampen: "样本熵",
      Image_analysis: "图像分析",
      rqa: "RQA"
    },
  }
};

function applyI18n(lang) {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const keys = el.dataset.i18n.split(".");
    let value = i18n[lang];
    keys.forEach(k => value = value?.[k]);
    if (value) el.textContent = value;
  });
  langSwitch.textContent = lang === "zh" ? "EN" : "中";
}

let currentLang = localStorage.getItem("lang") || "en";
applyI18n(currentLang);

langSwitch.addEventListener("click", () => {
  currentLang = currentLang === "zh" ? "en" : "zh";
  localStorage.setItem("lang", currentLang);
  applyI18n(currentLang);
});

const navMap = {
  "nav-analysis": "analysis-dropdown",
  "nav-deep": "deep-dropdown"
};

function hideAllDropdowns() {
  Object.values(navMap).forEach(id => {
    document.getElementById(id).style.display = "none";
  });
}

Object.entries(navMap).forEach(([navId, dropId]) => {
  document.getElementById(navId).addEventListener("click", e => {
    e.preventDefault();
    e.stopPropagation();
    window.scrollTo({ top: 0, behavior: "smooth" });
    hideAllDropdowns();
    document.getElementById(dropId).style.display = "block";
  });
});

document.querySelectorAll(".dropdown-menu").forEach(menu => {
  menu.addEventListener("click", e => e.stopPropagation());
});

document.addEventListener("click", hideAllDropdowns);

const routes = {
  videoRecognition: "../index/VideoRecognition.html",
  idSingle: "../index/IDPointAnalysis.html",
  idAll: "../index/AllIDPointAnalysis.html",
  heatmap: "../index/HeatMap.html",
  sampen: "../DeepAnalysis/SampleEntropy.html",
  Image_analysis: "{{ url_for('index') }}",
  rqa: "../DeepAnalysis/RQA.html",
  unprocessedFrames: "../VideoRecognition/UnprocessedFrames.html",
  processedFrames: "../VideoRecognition/ProcessedFrames.html",
  excelTable: "../VideoRecognition/ExcelTable.html",
};

document.querySelectorAll(".option-card[data-action]").forEach(card => {
  card.addEventListener("click", () => {
    const action = card.dataset.action;
    if (routes[action]) {
      location.href = routes[action];
    }
  });
});
document.querySelectorAll(".dropdown-item").forEach(item => {
  item.onclick = () => {
    const action = item.dataset.action;

    if (action === "Image_analysis") {
      location.href = "/index?open=Image_analysis";
    } else if (routes[action]) {
      location.href = routes[action];
    }
    };
});

//<!-- Excel 读取相关代码 -->
let workbook;  // 全局 Excel 数据
let sheetData; // 当前选中 Sheet 数据

// ========== 上传 Excel 并加载 Sheet ==========
function loadSheetNames() {
    let file = document.getElementById("fileInput").files[0];
    if (!file) { alert("请选择文件"); return; }

    file.arrayBuffer().then(data => {
        workbook = XLSX.read(data, { type: "array" });
        const sel = document.getElementById("sheetSelect");
        sel.innerHTML = "";

        workbook.SheetNames.forEach(name => {
            let opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
        });

        alert("Excel file read successfully. Please select Sheet.");
    });
}

// ========== 处理选中 Sheet ==========
function processSelectedSheet() {
    if (!workbook) { alert("Please upload Excel file first."); return; }

    const sheetName = document.getElementById("sheetSelect").value;
    const sheet = workbook.Sheets[sheetName];

    // 读取二维数组
    let rawData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

    // 删除完全为空的行（至少 joint_1~joint_8 有一个有效数值）
    rawData = rawData.filter(row => row.some(cell => cell !== null && cell !== ''));

    if (rawData.length < 2) { alert("Sheet has no valid data!"); return; }

    // 第一行是列名
    const headers = rawData[0].map(h => h.toString().trim());
    const dataRows = rawData.slice(1);

    // 转对象数组
    sheetData = dataRows.map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = row[i]);
        return obj;
    });

    document.getElementById("log").textContent = '';
    logMsg(`Sheet "${sheetName}" Valid row count: ${sheetData.length}`);

    computeSampleEntropy();
}

// ========== 样本熵计算 ==========
function computeSampleEntropy() {
    if (!sheetData || sheetData.length === 0) return;

    const m = parseInt(document.getElementById("m").value);
    const tau = parseInt(document.getElementById("tau").value);
    const r_ratio = parseFloat(document.getElementById("r_ratio").value);
    const applyFilter = document.getElementById("applyFilter").checked;
    const fs = parseFloat(document.getElementById("fs").value);
    const fc = parseFloat(document.getElementById("fc").value);

    const joints = ["joint_1","joint_2","joint_3","joint_4","joint_5","joint_6","joint_7","joint_8"];
    const results = [];

    for (let joint of joints) {
        const seq = sheetData.map(r => r[joint]).filter(v => Number.isFinite(v));
        if (seq.length === 0) {
            logMsg(`Skip ${joint}, no valid data`);
            continue;
        }

        let filteredSeq = applyFilter && seq.length > 5 ? filtfiltButter(seq,4,fc/(fs/2)) : seq;

        const std = mathStd(filteredSeq);
        const r = r_ratio * std;
        const se = sample_entropy_correct(filteredSeq, m, r, tau);

        logMsg(`${joint} Sample Entropy: ${se.toFixed(4)}`);
        results.push({Joint: joint, SampleEntropy: se});
    }

    if (results.length > 0) {
        // 导出 Excel
        const ws = XLSX.utils.json_to_sheet(results);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "SampleEntropy");
        XLSX.writeFile(wb, "SampleEntropy_Result.xlsx");
        logMsg("Sample Entropy Excel file generated successfully!");

        // 绘制 Plotly 柱状图
        const trace = {
            x: results.map(r => r.Joint),
            y: results.map(r => r.SampleEntropy),
            type: 'bar'
        };
        Plotly.newPlot('plot',[trace], {title:'Sample Entropy of Each Joint'});
    } else {
        logMsg("No valid data to compute Sample Entropy.");
    }
}

// ========== 工具函数 ==========
function logMsg(msg) { document.getElementById("log").textContent += msg + "\n"; }

function sample_entropy_correct(data,m,r,tau){
    const N = data.length;
    const Nm = N-(m-1)*tau;
    if (Nm<2) return NaN;

    const Xm = [];
    for(let i=0;i<Nm;i++){
        const row=[];
        for(let k=0;k<m;k++) row.push(data[i+k*tau]);
        Xm.push(row);
    }

    const Nm1 = N-m*tau;
    const Xm1=[];
    if(Nm1>=2){
        for(let i=0;i<Nm1;i++){
            const row=[];
            for(let k=0;k<=m;k++) row.push(data[i+k*tau]);
            Xm1.push(row);
        }
    }

    let B=0,A=0;
    for(let i=0;i<Xm.length-1;i++)
        for(let j=i+1;j<Xm.length;j++)
            if(maxAbsDiff(Xm[i],Xm[j])<=r) B++;

    for(let i=0;i<Xm1.length-1;i++)
        for(let j=i+1;j<Xm1.length;j++)
            if(maxAbsDiff(Xm1[i],Xm1[j])<=r) A++;

    if(B===0) return NaN;
    if(A===0) return Infinity;
    return -Math.log(A/B);
}

function maxAbsDiff(a,b){
    let m=0;
    for(let i=0;i<a.length;i++) m=Math.max(m,Math.abs(a[i]-b[i]));
    return m;
}

function mathStd(arr){
    const m=arr.reduce((a,b)=>a+b,0)/arr.length;
    return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length);
}

// Butterworth + filtfilt
function filtfiltButter(data,order,Wn){
    const [b,a]=butter(order,Wn);
    let y=lfilter(b,a,data);
    y=lfilter(b,a,y.slice().reverse()).reverse();
    return y;
}

function butter(order,Wn){
    const ita=1/Math.tan(Math.PI*Wn);
    const q=Math.sqrt(2);
    const b=[1/(1+q*ita+ita*ita), 2/(1+q*ita+ita*ita), 1/(1+q*ita+ita*ita)];
    const a=[1, 2*(ita*ita-1)/(1+q*ita+ita*ita), (1-q*ita+ita*ita)/(1+q*ita+ita*ita)];
    return [b,a];
}

function lfilter(b,a,data){
    const y=new Array(data.length).fill(0);
    for(let i=0;i<data.length;i++){
        y[i]=b[0]*data[i]+(b[1]*(data[i-1]||0))+(b[2]*(data[i-2]||0))
             -(a[1]*(y[i-1]||0))-(a[2]*(y[i-2]||0));
    }
    return y;
}
</script>
