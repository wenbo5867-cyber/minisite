    let currentLang = localStorage.getItem("lang") || "en";

    function renderLang(lang) {
      document.querySelectorAll("[data-i18n]").forEach(el => {

    renderLang(currentLang);

    /* ========= 下拉控制 ========= */
    const analysis = document.getElementById("data-analysis");
    const deep = document.getElementById("deep-analysis");

    const ad = document.getElementById("analysis-dropdown");
    const dd = document.getElementById("deep-dropdown");

    function hideAll() {
      ad.style.display = dd.style.display = "none";
    }

    analysis.onclick = e => {

      e.stopPropagation();
      window.scrollTo({ top: 0, behavior: "smooth" });

      hideAll();

    };

    document.addEventListener("click", e => {
      if (![analysis, deep, ad, dd].some(el => el.contains(e.target))) {

    window.addEventListener("scroll", () => {

    });

    /* ========= 路由映射 ========= */
    const routes = {
      videoRecognition: "../index/VideoRecognition.html",
      idSingle: "../index/IDPointAnalysis.html",
      idAll: "../index/AllIDPointAnalysis.html",

        if (action === "Image_analysis") {

        };
    });

    /* ========= 语言切换 ========= */
    document.getElementById("langSwitch").onclick = () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      localStorage.setItem("lang", currentLang);
      renderLang(currentLang);
    };

    const pages = {
      xyTrajectory: "../IDPointAnalysis/XYTrajectory.html",
      xSignal: "../IDPointAnalysis/XSignal.html",
      ySignal: "../IDPointAnalysis/YSignal.html",
      xInstantFrequency: "../IDPointAnalysis/XInstantFrequency.html",
      yInstantFrequency: "../IDPointAnalysis/YInstantFrequency.html",
      avgFrequency: "../IDPointAnalysis/AvgFrequency.html",
    };

    document.querySelector(".content-lift").addEventListener("click", function (e) {

      const card = e.target.closest(".item-card");
      
      if (!card) return;

      const action = card.dataset.action;

      if (pages[action]) {
        window.location.href = pages[action];
      }
    });


    // --- 工具函数与核心逻辑 ---
    const fileInput = document.getElementById('fileInput');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const uploadArea = document.getElementById('uploadArea');
    const uploadStatus = document.getElementById('uploadStatus');
    const idSelect = document.getElementById('idSelect');
    const runBtn = document.getElementById('runBtn');
    const resultsDiv = document.getElementById('results');

    let parsedData = null;
    let uniqueIDs = [];

    selectFileBtn.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => { 
      e.preventDefault(); 
      uploadArea.classList.add('drag-over'); 
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault(); 
      uploadArea.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFileUpload(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFileUpload(e.target.files[0]); });

    function showStatus(msg, status='info'){
      uploadStatus.className = 'upload-status ' + status;
      uploadStatus.innerHTML = `<p>${msg}</p>`;
    }

    function handleFileUpload(file){
      if (!file.name.match(/\.(xlsx|xls|csv)$/i)) { showStatus('Please select an Excel file!','error'); return; }
      showStatus(`Uploading: ${file.name}`, 'uploading');
      const reader = new FileReader();
      reader.onload = function(e){
        const data = e.target.result;
        let workbook;
        try{
          workbook = XLSX.read(data, {type: 'binary'});
        } catch(err){
          showStatus('Failed to read file: ' + err.message, 'error');
          return;
        }
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(firstSheet, {defval: null});
        // 标准化表头：ID, X, Y, Time
        if (!json.length) { 
          showStatus('Excel sheet is empty', 'error'); 
          return; 
        }
        const requiredBase = ['frameID', 'Time'];
        for (const k of requiredBase) {
          if (!(k in json[0])) {
            showStatus(`Missing required fields: ${k}`, 'error');
            return;
          }
        }

        // 检查 8 个 ID 的列是否存在
        for (let i = 1; i <= 8; i++) {
          if (
            !(`centroidX_${i}` in json[0]) ||
            !(`centroidY_${i}` in json[0])
          ) {
            showStatus(`Missing required fields: centroidX_${i} or centroidY_${i}`, 'error');
            return;
          }
        }

        parsedData = [];

        json.forEach(row => {
          const time = Number(row['Time']);
          const frameID = Number(row['frameID']);

          if (Number.isNaN(time)) return;

          for (let i = 1; i <= 8; i++) {
            const x = Number(row[`centroidX_${i}`]);
            const y = Number(row[`centroidY_${i}`]);
            const area = Number(row[`dotArea_${i}`]);
            const ecc  = Number(row[`dotEccentricities_${i}`]);

            if (Number.isNaN(x) || Number.isNaN(y)) continue;

            parsedData.push({
              ID: i,
              Frame: frameID,
              Time: time,
              X: x,
              Y: y,
              Area: area,
              Ecc: ecc
            });
          }
        });

        if (!parsedData.length) {
          showStatus('No valid point data parsed', 'error');
          return;
        }
        
        // 收集 unique IDs
        uniqueIDs = Array.from(new Set(parsedData.map(r=>r.ID))).sort((a,b)=>a-b);
        populateIDSelect();
        showStatus(`File read successfully: ${file.name} 。Detected ${uniqueIDs.length} unique IDs`, 'success');
        runBtn.disabled = false;
      };
      // 读取为二进制字符串
      reader.readAsBinaryString(file);
    }

    function populateIDSelect(){
      idSelect.innerHTML = '';
      const placeholder = document.createElement('option'); placeholder.value=''; placeholder.textContent = 'Please select or input ID (numeric)'; idSelect.appendChild(placeholder);
      uniqueIDs.forEach(id => { const o = document.createElement('option'); o.value = id; o.textContent = id; idSelect.appendChild(o); });
      // 允许输入 - 使用 datalist 简化（也可直接输入）
    }

    runBtn.addEventListener('click', () => {
      const selected = idSelect.value;
      if (!selected){ alert('Please select one ID'); return; }
      const selectedID = Number(selected);
      if (!uniqueIDs.includes(selectedID)) { alert('Selected ID does not exist'); return; }
      // 只分析用户选择的单个 ID
      resultsDiv.innerHTML = '';
      analyzeSingleID(selectedID);
    });

    // ========== 数据处理函数 ==========
    function movingAverage(arr, windowSize){
      if (windowSize<=1) return arr.slice();
      const half = Math.floor(windowSize/2);
      const out = new Array(arr.length).fill(0);
      for (let i=0;i<arr.length;i++){
        let start = Math.max(0, i-half);
        let end = Math.min(arr.length-1, i+half);
        let sum=0, cnt=0;
        for (let j=start;j<=end;j++){ sum += arr[j]; cnt++; }
        out[i] = sum/cnt;
      }
      return out;
    }

    function isUniform(timeArr){
      if (timeArr.length<2) return true;
      const diffs = [];
      for (let i=1;i<timeArr.length;i++) diffs.push(timeArr[i]-timeArr[i-1]);
      const mean = diffs.reduce((a,b)=>a+b,0)/diffs.length;
      const sd = Math.sqrt(diffs.map(d=>Math.pow(d-mean,2)).reduce((a,b)=>a+b,0)/diffs.length);
      return sd <= 1e-10 * Math.abs(mean);
    }

    function linspace(a,b,n){
      if (n===1) return [a];
      const out=[]; for (let i=0;i<n;i++) out.push(a + (b-a)*i/(n-1)); return out;
    }

    function interp1(x, y, xi){
      // assume x sorted
      const yi = [];
      for (const xv of xi){
        if (xv <= x[0]) { yi.push(y[0]); continue; }
        if (xv >= x[x.length-1]) { yi.push(y[y.length-1]); continue; }
        // find interval
        let j=0; while (x[j+1] < xv) j++;
        const t = (xv - x[j])/(x[j+1]-x[j]);
        yi.push(y[j] + t*(y[j+1]-y[j]));
      }
      return yi;
    }

    function std(arr){
      const m = arr.reduce((a,b)=>a+b,0)/arr.length; return Math.sqrt(arr.map(x=>Math.pow(x-m,2)).reduce((a,b)=>a+b,0)/arr.length);
    }

    // 简单 findpeaks：局部极大值并且高于 prominenceThreshold
    function findPeaks(signal, prominenceThreshold){
      const peaks=[]; const locs=[];
      for (let i=1;i<signal.length-1;i++){
        if (signal[i]>signal[i-1] && signal[i]>signal[i+1] && signal[i] >= (prominenceThreshold || -Infinity)){
          peaks.push(signal[i]); locs.push(i);
        }
      }
      return {peaks, locs};
    }

    // jet colormap (n colors) 返回 array of 'rgb(r,g,b)'
    function jetColorMap(n){
      function clamp(v){ return Math.max(0, Math.min(1, v)); }
      const cmap = [];
      for (let i=0;i<n;i++){
        const x = 2*i/(n-1); // 0..2
        let r = clamp(Math.min(x-1.5, -x+4.5));
        let g = clamp(Math.min(x-0.5, -x+3.5));
        let b = clamp(Math.min(x+0.5, -x+2.5));
        // simple scaling
        r = Math.round(r*255); g = Math.round(g*255); b = Math.round(b*255);
        cmap.push(`rgb(${r},${g},${b})`);
      }
      return cmap;
    }

    // 分析单个 ID 并渲染
    function analyzeSingleID(id){
      const rows = parsedData.filter(r => r.ID == id).sort((a,b)=>a.Time - b.Time);
      if (!rows.length) return;
      let time = rows.map(r=>r.Time.slice?Number(r.Time.slice(0)):Number(r.Time));
      time = time.map(Number);
      let x = rows.map(r=>Number(r.X));
      let y = rows.map(r=>Number(r.Y));
      const N = x.length;
      // 重采样（如果非均匀采样）
      if (!isUniform(time)){
        showStatus(`ID ${id} time is non-uniform, resampling...`, 'info');
        const uniformTime = linspace(Math.min(...time), Math.max(...time), time.length);
        x = interp1(time, x, uniformTime);
        y = interp1(time, y, uniformTime);
        time = uniformTime;
      }
      const Fs = 1 / (time.length>1 ? (time[1]-time[0]) : 1);
      // 滤波（移动平均）
      const windowSize = Math.min(5, Math.max(1, Math.floor(N/20) || 5));
      const x_filtered = movingAverage(x, windowSize);
      const y_filtered = movingAverage(y, windowSize);
      // 峰值检测
      const px = findPeaks(x_filtered, 0.5*std(x_filtered));
      const tx = findPeaks(x_filtered.map(v=>-v), 0.5*std(x_filtered));
      const py = findPeaks(y_filtered, 0.5*std(y_filtered));
      const ty = findPeaks(y_filtered.map(v=>-v), 0.5*std(y_filtered));

      // 绘图分段：按用户输入的点数分段，每段生成独立小图
      const segSize = parseInt(document.getElementById('segmentSize')?.value) || 10;
      const numSegments = Math.ceil(N / segSize);

      // 创建容器（一个 ID 一个容器，容器内每段为小图）
      const container = document.createElement('div'); container.className='single-result';
      const title = document.createElement('h3'); title.textContent = `ID ${id} - Split Trajectory (${N} points, ${numSegments} segments, ${segSize} points per segment)`;
      container.appendChild(title);

      const cmap = jetColorMap(N);

      for (let seg=0; seg<numSegments; seg++){
        const startIdx = seg * segSize;
        const endIdx = Math.min((seg+1) * segSize, N);

        const segContainer = document.createElement('div'); segContainer.style.marginTop = '12px';
        const segTitle = document.createElement('h4'); segTitle.textContent = `part ${seg+1} point:  ${startIdx+1} - ${endIdx}`;
        segContainer.appendChild(segTitle);

        const segPlotDiv = document.createElement('div'); segPlotDiv.id = `plot_${id}_seg${seg}`; segPlotDiv.style.width = '100%'; segPlotDiv.style.height = '320px';
        segContainer.appendChild(segPlotDiv);

        // 构建此段的 traces
        const traces_seg = [];
        for (let k=startIdx; k<endIdx-1; k++){
          traces_seg.push({ 
            x:[x[k], x[k+1]], 
            y:[y[k], y[k+1]], 
            mode:'lines', 
            line:{width:2}, 
            hoverinfo:'none', 
            showlegend:false, 
            line_color:cmap[k] 
          });
        }
        traces_seg.push({ 
          x: x.slice(startIdx, endIdx), 
          y: y.slice(startIdx, endIdx), 
          mode:'markers', 
          marker:{size:6, color: cmap.slice(startIdx, endIdx)}, 
          name:`Segment ${seg+1}` 
        });
        traces_seg.push({ 
          x: [x[startIdx]], 
          y:[y[startIdx]], 
          mode:'markers', 
          marker:{size:9, color:'green'}, 
          name:'Start', 
          showlegend:false 
        });
        traces_seg.push({ 
          x: [x[endIdx-1]], 
          y:[y[endIdx-1]], 
          mode:'markers', 
          marker:{size:9, color:'red'}, 
          name:'End', 
          showlegend:false 
        });

        const layout_seg = { 
          xaxis:{title:'X'}, 
          yaxis:{title:'Y'}, 
          margin:{t:30, l:50, r:30, b:40}, 
          height:320, 
          plot_bgcolor:'#ffffff' 
        };

        Plotly.newPlot(segPlotDiv, traces_seg, layout_seg, {responsive:true});

        // 下载按钮（此段）
        const btnRow = document.createElement('div'); 
        btnRow.className = 'result-actions';
        const savePNG = document.createElement('button'); 
        savePNG.className='download-btn'; 
        savePNG.textContent = 'Download PNG';
        const saveSVG = document.createElement('button'); 
        saveSVG.className='download-btn'; 
        saveSVG.textContent = 'Download SVG';
        btnRow.appendChild(savePNG); 
        btnRow.appendChild(saveSVG);
        segContainer.appendChild(btnRow);

        savePNG.addEventListener('click', () => {
          Plotly.toImage(segPlotDiv, {format:'png', height:layout_seg.height, width:Math.min(1200, window.innerWidth-100)})
            .then(url => { const a = document.createElement('a'); 
            a.href = url; 
            a.download = `ID_${id}_seg${seg}.png`;
             a.click(); 
            })
            .catch(err=>alert('Download PNG failed: '+err));
        });
        saveSVG.addEventListener('click', () => {
          Plotly.toImage(segPlotDiv, {
            format: 'svg',
            height: layout_seg.height,
            width: Math.min(1200, window.innerWidth - 100)
          }).then(res => {

            let svgText;

            if (res.startsWith('<svg')) {
              // 情况 3：纯 SVG
              svgText = res;

            } else if (res.startsWith('data:image/svg+xml;base64,')) {
              // 情况 2：base64 SVG
              const base64 = res.split(',')[1];
              svgText = atob(base64);

            } else if (res.startsWith('data:image/svg+xml')) {
              // 情况 1：URL-encoded SVG（你现在这个）
              const encoded = res.split(',')[1];
              svgText = decodeURIComponent(encoded);

            } else {
              throw new Error('Unknown SVG data format');
            }

            const blob = new Blob([svgText], {
              type: 'image/svg+xml;charset=utf-8'
            });

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ID_${id}_seg${seg}.svg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

          }).catch(err => {
            alert('Download SVG failed: ' + err.message);
          });
        });


        container.appendChild(segContainer);
      }

      // 一键全部下载按钮
        const downloadAllPngBtn = document.createElement('button');
        downloadAllPngBtn.className = 'download-btn';
        downloadAllPngBtn.textContent = 'Download All Segments (PNG ZIP)';
        downloadAllPngBtn.style.marginTop = '15px';
        downloadAllPngBtn.addEventListener('click', ()=> downloadAllSegments(id, numSegments));

        const downloadAllSvgBtn = document.createElement('button');
        downloadAllSvgBtn.className = 'download-btn';
        downloadAllSvgBtn.textContent = 'Download All Segments (SVG ZIP)';
        downloadAllSvgBtn.style.marginTop = '15px';
        downloadAllSvgBtn.style.marginLeft = '8px';
        downloadAllSvgBtn.addEventListener('click', ()=> downloadAllSVGs(id, numSegments));

        container.appendChild(downloadAllPngBtn);
        container.appendChild(downloadAllSvgBtn);

        resultsDiv.appendChild(container);

    }

    function dataURLToBlob(dataurl){
      const arr = dataurl.split(','); const mime = arr[0].match(/:(.*?);/)[1]; const bstr = atob(arr[1]); let n = bstr.length; const u8arr = new Uint8Array(n);
      while(n--) u8arr[n] = bstr.charCodeAt(n);
      return new Blob([u8arr], {type:mime});
    }

<!-- JSZip CDN -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
// 一键下载全部段落图
function downloadAllSegments(id, numSegments){
  const zip = new JSZip();
  const folder = zip.folder(`ID_${id}_all_segments`);

  const promises = [];

  for(let seg=0; seg<numSegments; seg++){
    const segDiv = document.getElementById(`plot_${id}_seg${seg}`);
    if (!segDiv) continue;

    const p = Plotly.toImage(segDiv, {
      format:'png',
      height:segDiv.layout?.height || 320,
      width:Math.min(1200, window.innerWidth-100)
    }).then(url=>{
      const base64 = url.split(',')[1];
      folder.file(`ID_${id}_seg${seg+1}.png`, base64, {base64:true});
    });

    promises.push(p);
  }

  Promise.all(promises).then(()=>{
    zip.generateAsync({type:"blob"}).then(blob=>{
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `ID_${id}_all_segments.zip`;
      link.click();
    });
  });
}

// 正确实现的一键导出 SVG 并打包函数
function downloadAllSVGs(id, numSegments) {
  const zip = new JSZip();
  const folder = zip.folder(`ID_${id}_all_segments_svg`);
  const promises = [];

  for (let seg = 0; seg < numSegments; seg++) {
    const segDiv = document.getElementById(`plot_${id}_seg${seg}`);
    if (!segDiv) continue;

    const promise = Plotly.toImage(segDiv, {
      format: 'svg',
      height: 320,
      width: Math.min(1200, window.innerWidth - 100)
    }).then(url => {
      if (url.startsWith('data:image/svg+xml;base64,')) {
        const base64Data = url.split(',')[1];
        const svgText = atob(base64Data);
        folder.file(`ID_${id}_seg${seg + 1}.svg`, svgText);
      } else if (url.startsWith('data:image/svg+xml,')) {
        const svgData = decodeURIComponent(url.split(',')[1]);
        folder.file(`ID_${id}_seg${seg + 1}.svg`, svgData);
      } else if (url.startsWith('<svg')) {
        folder.file(`ID_${id}_seg${seg + 1}.svg`, url);
      }
    }).catch(err => {
      console.warn(`SVG export failed for segment ${seg}:`, err);
    });

    promises.push(promise);
  }

  Promise.allSettled(promises).then(() => {
    zip.generateAsync({ type: "blob" }).then(blob => {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `ID_${id}_all_segments_svg.zip`;
      link.click();
    }).catch(err => {
      alert('Create ZIP file failed: ' + err.message);
    });
  });
}
</script>
