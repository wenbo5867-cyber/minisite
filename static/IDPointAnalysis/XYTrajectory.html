<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Y Trajectory Chart - Laboratory</title>
  <link rel="stylesheet" href="../CSS/001.css">
  <link rel="stylesheet" href="../CSS/IDPointAnalysis/ChartPage.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
  <header class="main-header">
    <div class="header-container">

      <!-- 导航 -->
      <nav class="main-navigation">
        <ul class="nav-menu">

          <li class="nav-item" id="data-analysis">
            <a href="#" class="nav-link">
              <span class="icon">📈</span>
              <span class="text" data-i18n="nav_analysis"></span>
            </a>
          </li>

          <li class="nav-item" id="deep-analysis">
            <a href="#" class="nav-link">
              <span class="icon">🔍</span>
              <span class="text" data-i18n="nav_deep"></span>
            </a>
          </li>
        </ul>
      </nav>
      <!-- 语言切换 -->
      <button id="langSwitch" style="margin-left:20px;">EN</button>
    </div>
  </header>
  
  <!-- 下拉选项框 -->
  <div class="dropdown-container">

    <!-- 数据分析 -->
    <div class="dropdown-menu" id="analysis-dropdown">
      <div class="dropdown-item" data-action="videoRecognition" data-i18n="video_recognition"></div>
      <div class="dropdown-item" data-action="idSingle" data-i18n="id_single"></div>
      <div class="dropdown-item" data-action="idAll" data-i18n="id_all"></div>
    </div>

    <!-- 深度分析 -->
    <div class="dropdown-menu" id="deep-dropdown">
      <div class="dropdown-item" data-action="Image_analysis" data-i18n="Image_analysis" id="Image_analysisSection"></div>
      <div class="dropdown-item" data-action="sampen" data-i18n="sampen"></div>
      <div class="dropdown-item" data-action="rqa" data-i18n="rqa"></div>
    </div>
  </div>
  
  <main class="main-content" style="margin-top: 100px;">
    <section class="content-lift">
        <div class="item-card" data-page="xy-trajectory" data-action="xyTrajectory">
          <h3 data-i18n="xyTrajectory" style="color: #007bff;"></h3>
        </div>
        <div class="item-card" data-page="x-signal" data-action="xSignal">
          <h3 data-i18n="xSignal"></h3>
        </div>
        <div class="item-card" data-page="y-signal" data-action="ySignal">
          <h3 data-i18n="ySignal"></h3>
        </div>
        <div class="item-card" data-page="x-instant-frequency" data-action="xInstantFrequency">
          <h3 data-i18n="xInstantFrequency"></h3>
        </div>
        <div class="item-card" data-page="y-instant-frequency" data-action="yInstantFrequency">
          <h3 data-i18n="yInstantFrequency"></h3>
        </div>
        <div class="item-card" data-page="avg-frequency" data-action="avgFrequency">
          <h3 data-i18n="avgFrequency"></h3>
        </div>
        <div class="item-card" data-page="split-trajectory" data-action="splitTrajectory">
          <h3 data-i18n="splitTrajectory"></h3> 
        </div>
    </section>

    <section class="content-section">
      <h2>XYTrajectory</h2>

      <div class="upload-section">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📊</div>
          <p data-i18n="qqq"></p>
          <p class="file-info" data-i18n="supported_formats"></p>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
        </div>
        <button class="upload-btn" id="selectFileBtn" data-i18n="select_file"></button>
      </div>

      <div class="action-section">
        <label for="inputID" data-i18n="input_id"></label>
        <input type="number" id="inputID" />
        <button id="analyzeBtn" data-i18n="analyze"></button>
      </div>

      <div class="status-section">
        <div class="upload-status" id="uploadStatus">
          <p data-i18n="waiting_upload"></p>
        </div>
      </div>

      <div class="action-section">
        <button class="download-btn" id="downloadBtn" disabled data-i18n="download_svg"></button>
      </div>

      <div class="chart-container">
        <div id="plot" style="width:100%;height:600px;"></div>
      </div>
    </section>
  </main>
  
  
<script>
      const i18n = {
      zh: {
        nav_analysis: "数据分析",
        nav_deep: "深度分析",

        video_recognition: "视频识别",
        id_single: "每个ID点的X和Y分析结果",
        id_all: "所有ID点的X和Y分析结果(总图)",

        sampen: "样本熵",
        Image_analysis: "图像分析",
        rqa: "RQA",
        qqq: "点击选择Excel文件或拖拽至此处",
        supported_formats: " Excel、CSV 等",
        select_file: "选择文件",
        input_id: "输入ID：",
        analyze: "分析",
        waiting_upload: "等待上传...",
        processed_frames: "处理的帧数",
        processing_complete: "处理完成",
        processing_failed: "处理失败",
        total_frames: "总帧数",
        packing_zip: "正在打包ZIP",
        download_complete: "下载完成",
        download_failed: "下载失败",
        download_zip: "正在下载ZIP",
        download_excel: "正在下载Excel",
        download_excel_complete: "Excel下载完成",
        download_excel_failed: "Excel下载失败",
        download_svg: "下载SVG",

        xyTrajectory: "X-Y 轨迹",
        xSignal: "X 信号",
        ySignal: "Y 信号",
        xInstantFrequency: "X 瞬时频率",
        yInstantFrequency: "Y 瞬时频率",
        avgFrequency: "平均频率比较",
        splitTrajectory: "分割轨迹",
        
      },
      en: {
        nav_analysis: "Data Analysis",
        nav_deep: "In-depth Analysis",

        video_recognition: "Video Recognition",
        id_single: "Single ID Point X and Y Analysis",
        id_all: "All ID Point X and Y Analysis(Overall)",
        heatmap: "Heat Map",

        sampen: "Sample Entropy",
        Image_analysis: "Image Analysis",
        rqa: "RQA",
        qqq: "Click to select an Excel file or drag and drop it here",
        supported_formats: "Supported Formats: Excel, CSV, etc.",
        select_file: "Select File",
        waiting_upload: "Waiting for upload...",
        input_id: "Input ID:",
        analyze: "Analyze",
        processed_frames: "Processed Frames",
        processing_complete: "Processing Complete",
        processing_failed: "Processing Failed",
        total_frames: "Total Frames",
        packing_zip: "Packing ZIP",
        download_complete: "Download Complete",
        download_failed: "Download Failed",
        download_zip: "Downloading ZIP",
        download_excel: "Downloading Excel",
        download_excel_complete: "Excel Download Complete",
        download_excel_failed: "Excel Download Failed",
        download_svg: "Download SVG",

        xyTrajectory: "X-Y Trajectory",
        xSignal: "X Signal",
        ySignal: "Y Signal",
        xInstantFrequency: "X Instantaneous Frequency",
        yInstantFrequency: "Y Instantaneous Frequency",
        avgFrequency: "Average Frequency Comparison",
        splitTrajectory: "Split Trajectory",
      }
    };

    let currentLang = localStorage.getItem("lang") || "en";

    function renderLang(lang) {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.innerText = i18n[lang][el.dataset.i18n];
      });
      document.getElementById("langSwitch").innerText = lang === "zh" ? "EN" : "中";
    }

    renderLang(currentLang);

    const analysis = document.getElementById("data-analysis");
    const deep = document.getElementById("deep-analysis");

    const ad = document.getElementById("analysis-dropdown");
    const dd = document.getElementById("deep-dropdown");

    function hideAll() {
      ad.style.display = dd.style.display = "none";
    }

    analysis.onclick = e => { 
      hideAll(); 
      e.stopPropagation();
      window.scrollTo({ top: 0, behavior: "smooth" });
      ad.style.display = "block"; 
    };
    deep.onclick = e => { 
      hideAll();
      e.stopPropagation();
      window.scrollTo({ top: 0, behavior: "smooth" });
      dd.style.display = "block"; 
    };

    document.addEventListener("click", e => {
      if (![analysis, deep, ad, dd].some(el => el.contains(e.target))) {
        hideAll();
      }
    });
    window.addEventListener("scroll", () => {
      hideAll();
    });

    const routes = {
      openVideo: "../index/OpenVideo.html",
      clipVideo: "../index/ClipVideo.html",
      videoRecognition: "../index/VideoRecognition.html",
      idSingle: "../index/IDPointAnalysis.html",
      idAll: "../index/AllIDPointAnalysis.html",
      heatmap: "../index/HeatMap.html",
      sampen: "../DeepAnalysis/SampleEntropy.html",
      Image_analysis: "../DeepAnalysis/ImageAnalysis.html",
      rqa: "../DeepAnalysis/RQA.html"
    };

    document.querySelectorAll(".option-card[data-action]").forEach(card => {
      card.addEventListener("click", () => {
        const action = card.dataset.action;
        if (routes[action]) {
          location.href = routes[action];
        }
      });
    });
    document.querySelectorAll(".dropdown-item").forEach(item => {
      item.onclick = () => {
        const action = item.dataset.action;

        if (action === "Image_analysis") {
          location.href = "/index?open=Image_analysis";
        } else if (routes[action]) {
          location.href = routes[action];
        }
        };
    });

    document.getElementById("langSwitch").onclick = () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      localStorage.setItem("lang", currentLang);
      renderLang(currentLang);
    };

    const pages = {
      xSignal: "../IDPointAnalysis/XSignal.html",
      ySignal: "../IDPointAnalysis/YSignal.html",
      xInstantFrequency: "../IDPointAnalysis/XInstantFrequency.html",
      yInstantFrequency: "../IDPointAnalysis/YInstantFrequency.html",
      avgFrequency: "../IDPointAnalysis/AvgFrequency.html",
      splitTrajectory: "../IDPointAnalysis/SplitTrajectory.html",
    };

    document.querySelector(".content-lift").addEventListener("click", function (e) {

      const card = e.target.closest(".item-card");
      
      if (!card) return;

      const action = card.dataset.action;

      if (pages[action]) {
        window.location.href = pages[action];
      }
    });

  /* ================= Excel 上传 ================= */
  const uploadArea     = document.getElementById('uploadArea');
  const fileInput      = document.getElementById('fileInput');
  const selectFileBtn  = document.getElementById('selectFileBtn');
  const uploadStatus   = document.getElementById('uploadStatus');
  const analyzeBtn     = document.getElementById('analyzeBtn');
  const downloadBtn    = document.getElementById('downloadBtn');
  const inputID        = document.getElementById('inputID');

  let globalData = [];          // 保存 Excel 读出的原始数据

  selectFileBtn.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFileUpload(e.target.files[0]);
  });
  uploadArea.addEventListener('dragover', e => {
    e.preventDefault(); 
    uploadArea.classList.add('drag-over');
  });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault(); 
    uploadArea.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0]);
  });

  function handleFileUpload(file) {
    const ok = /(\.xlsx|\.xls|\.csv)$/i.test(file.name);
    if (!ok) return showStatus('Please upload an Excel file!', 'error');
    showStatus('Loading Excel file...', 'uploading');
    const reader = new FileReader();
    reader.onload = evt => {
      const wb = XLSX.read(evt.target.result, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      globalData = XLSX.utils.sheet_to_json(sheet);
      showStatus(`Excel data loaded successfully! Total ${globalData.length} rows`, 'success');
    };
    reader.readAsArrayBuffer(file);
  }

  function showStatus(msg, st) {
    uploadStatus.innerHTML = `<p class="${st}">${msg}</p>`;
    uploadStatus.className   = 'upload-status ' + st;
  }

  /* ================= 仅绘制指定 ID 的轨迹 ================= */
  analyzeBtn.addEventListener('click', () => {
    if (!globalData.length) return alert('Please upload an Excel file first!');
    const id = Number(inputID.value);
    if (!Number.isFinite(id)) return alert('Please enter a valid ID!');

    const xKey   = `centroidX_${id}`;
    const yKey   = `centroidY_${id}`;
    const areaKey = `dotArea_${id}`;
    const confKey = `dotEccentricities_${id}`;
    const idData = globalData.filter(d =>
      Number.isFinite(d[xKey]) &&
      Number.isFinite(d[yKey])
    );
    if (!idData.length)
      return alert(`No data found for ID = ${id}!`);

    const trace = {
      x: idData.map(d => d[xKey]),
      y: idData.map(d => d[yKey]),
      mode: 'markers+lines',
      type: 'scatter',
      name: `ID ${id}`,

      text: idData.map(d =>
        `Frame: ${d.frameID}<br>` +
        `Time: ${d.Time}<br>`
      ),
      hoverinfo: 'text'
    };

    const layout = {
      title: `ID ${id} Trajectory`,
      xaxis: { title: 'X' },
      yaxis: { title: 'Y' },
      yaxis: {
      title: 'Y',
      scaleanchor: 'x',   
      scaleratio: 1
    },

    showlegend: true
    };

    Plotly.newPlot('plot', [trace], layout);
    downloadBtn.disabled = false;
  });

  /* ================= 下载 SVG ================= */
  downloadBtn.addEventListener('click', () => {
    Plotly.downloadImage(document.getElementById('plot'), {
      format: 'svg',
      filename: 'ID_Trajectory',
      width: 1000,
      height: 800
    });
  });
</script>
</body>
</html>
