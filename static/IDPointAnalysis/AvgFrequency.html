<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Average Frequency Comparison - Laboratory</title>
  <link rel="stylesheet" href="../CSS/001.css">
  <link rel="stylesheet" href="../CSS/IDPointAnalysis/ChartPage.css">
  <!-- SheetJS & Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="main-header">
    <div class="header-container">
      <!-- 导航 -->
      <nav class="main-navigation">
        <ul class="nav-menu">
          <li class="nav-item" id="data-analysis">
            <a href="#" class="nav-link">
              <span class="icon">📈</span>
              <span class="text" data-i18n="nav_analysis"></span>
            </a>
          </li>
          <li class="nav-item" id="deep-analysis">
            <a href="#" class="nav-link">
              <span class="icon">🔍</span>
              <span class="text" data-i18n="nav_deep"></span>
            </a>
          </li>
        </ul>
      </nav>
      <!-- 语言切换 -->
      <button id="langSwitch" style="margin-left:20px;">EN</button>
    </div>
  </header>
  
  <!-- 下拉选项框 -->
  <div class="dropdown-container">

    <!-- 数据分析 -->
    <div class="dropdown-menu" id="analysis-dropdown">
      <div class="dropdown-item" data-action="videoRecognition" data-i18n="video_recognition"></div>
      <div class="dropdown-item" data-action="idSingle" data-i18n="id_single"></div>
      <div class="dropdown-item" data-action="idAll" data-i18n="id_all"></div>
    </div>

    <!-- 深度分析 -->
    <div class="dropdown-menu" id="deep-dropdown">
      <div class="dropdown-item" data-action="Image_analysis" data-i18n="Image_analysis" id="Image_analysisSection"></div>
      <div class="dropdown-item" data-action="sampen" data-i18n="sampen"></div>
      <div class="dropdown-item" data-action="rqa" data-i18n="rqa"></div>
    </div>
  </div>
  
  <main class="main-content" style="margin-top: 100px;">
    <section class="content-lift">
        <div class="item-card" data-page="xy-trajectory" data-action="xyTrajectory">
          <h3 data-i18n="xyTrajectory" ></h3>
        </div>
        <div class="item-card" data-page="x-signal" data-action="xSignal">
          <h3 data-i18n="xSignal"></h3>
        </div>
        <div class="item-card" data-page="y-signal" data-action="ySignal">
          <h3 data-i18n="ySignal"></h3>
        </div>
        <div class="item-card" data-page="x-instant-frequency" data-action="xInstantFrequency">
          <h3 data-i18n="xInstantFrequency"></h3>
        </div>
        <div class="item-card" data-page="y-instant-frequency" data-action="yInstantFrequency">
          <h3 data-i18n="yInstantFrequency"></h3>
        </div>
        <div class="item-card" data-page="avg-frequency" data-action="avgFrequency">
          <h3 data-i18n="avgFrequency" style="color: #007bff;"></h3>
        </div>
        <div class="item-card" data-page="split-trajectory" data-action="splitTrajectory">
          <h3 data-i18n="splitTrajectory"></h3> 
        </div>
    </section>

    <section class="content-section">
      <h2>Average Frequency Comparison</h2>
      
      <!-- 上传Excel区域 -->
      <div class="upload-section">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📊</div>
          <p data-i18n="qqq"></p>
          <p class="file-info" data-i18n="supported_formats"></p>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
        </div>

        <button class="upload-btn" id="selectFileBtn" data-i18n="select_file"></button>
      </div>
      
      <!-- 状态显示区域 -->
      <div class="status-section">
        <div class="upload-status" id="uploadStatus">
          <p data-i18n="waiting_upload"></p>
        </div>
      </div>

      <!-- ID 选择区 -->
      <div class="id-row">
        <label for="idSelect" data-i18n="select_id_label"></label>
        <select id="idSelect"><option value="" data-i18n="select_id_prompt"></option></select>
        <button id="generateBtn" disabled data-i18n="generate_chart"></button>
      </div>
      
      <!-- 操作按钮区域 -->
      <div class="action-section">
        <button class="download-btn" id="downloadBtn" disabled data-i18n="download_csv"></button>
      </div>

      <!-- 图表区域（只显示 X 与 Y 平均频率） -->

        <div class="chart-placeholder">
          <canvas id="frequencyChart"></canvas>
          <p class="small" id="chartNote" data-i18n="chart_note"></p>
        </div>
      </div>
      
    </section>
  </main>
  
  <script>
    const i18n = {

        nav_analysis: "数据分析",
        nav_deep: "深度分析",

        video_recognition: "视频识别",
        id_single: "每个ID点的X和Y分析结果",
        id_all: "所有ID点的X和Y分析结果(总图)",
        heatmap: "热力图",

        sampen: "样本熵",
        Image_analysis: "图像分析",
        rqa: "RQA",
        qqq: "请选择Excel文件或拖拽至此处",
        supported_formats: "支持的格式：Excel, CSV, 等",
        select_file: "Select File",
        waiting_upload: "等待上传...",
        processed_frames: "已处理帧",
        processing_complete: "处理完成",
        processing_failed: "处理失败",
        total_frames: "总帧数",
        packing_zip: "正在打包ZIP",
        download_complete: "下载完成",
        download_failed: "下载失败",
        chart_note: "注：X 轴为 ID，Y 轴为平均频率",
        select_id_label: "选择 ID：",
        select_id_prompt: "请选择ID",
        generate_chart: "生成图表",
        download_csv: "下载SVG",

        xyTrajectory: "X-Y 轨迹",
        xSignal: "X 信号",
        ySignal: "Y 信号",
        xInstantFrequency: "X 瞬时频率",
        yInstantFrequency: "Y 瞬时频率",
        avgFrequency: "平均频率比较",
        splitTrajectory: "分割轨迹",
        
      },
      en: {
        nav_analysis: "Data Analysis",
        nav_deep: "In-depth Analysis",

        video_recognition: "Video Recognition",
        id_single: "Single ID Point X and Y Analysis",
        id_all: "All ID Point X and Y Analysis(Overall)",
        heatmap: "Heat Map",

        sampen: "Sample Entropy",
        Image_analysis: "Image Analysis",
        rqa: "RQA",
        qqq: "Click to select an Excel file or drag it here",
        supported_formats: "Supported Formats: Excel, CSV, etc.",
        select_file: "Select File",
        waiting_upload: "Waiting for upload...",
        processed_frames: "Processed Frames",
        processing_complete: "Processing Complete",
        processing_failed: "Processing Failed",
        total_frames: "Total Frames",
        packing_zip: "Packing ZIP",
        download_complete: "Download Complete",
        download_failed: "Download Failed",
        chart_note: "Note: X-axis is ID, Y-axis is Average Frequency",
        select_id_label: "Select ID: ",
        select_id_prompt: "Please select an ID",
        generate_chart: "Generate Chart",
        download_csv: "Download svg",

        xyTrajectory: "X-Y Trajectory",
        xSignal: "X Signal",
        ySignal: "Y Signal",
        xInstantFrequency: "X Instantaneous Frequency",
        yInstantFrequency: "Y Instantaneous Frequency",
        avgFrequency: "Average Frequency Comparison",
        splitTrajectory: "Split Trajectory",
        
      }
    };

    let currentLang = localStorage.getItem("lang") || "en";

    function renderLang(lang) {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.innerText = i18n[lang][el.dataset.i18n];
      });
      document.getElementById("langSwitch").innerText = lang === "zh" ? "EN" : "中";
    }

    renderLang(currentLang);

    /* ========= 下拉控制 ========= */
    const analysis = document.getElementById("data-analysis");
    const deep = document.getElementById("deep-analysis");

    const ad = document.getElementById("analysis-dropdown");
    const dd = document.getElementById("deep-dropdown");

    function hideAll() {
      ad.style.display = dd.style.display = "none";
    }

    analysis.onclick = e => { 
      hideAll(); 
      e.stopPropagation();
      window.scrollTo({ top: 0, behavior: "smooth" });
      ad.style.display = "block"; 
    };
    deep.onclick = e => { 
      hideAll();
      e.stopPropagation();
      window.scrollTo({ top: 0, behavior: "smooth" });
      dd.style.display = "block"; 
    };

    document.addEventListener("click", e => {
      if (![analysis, deep, ad, dd].some(el => el.contains(e.target))) {
        hideAll();
      }
    });
    window.addEventListener("scroll", () => {
      hideAll();
    });


    /* ========= 路由映射 ========= */
    const routes = {
      videoRecognition: "../index/VideoRecognition.html",
      idSingle: "../index/IDPointAnalysis.html",
      idAll: "../index/AllIDPointAnalysis.html",
      heatmap: "../index/HeatMap.html",
      Image_analysis: "{{ url_for('index') }}",
      rqa: "../DeepAnalysis/RQA.html"
    };

    document.querySelectorAll(".option-card[data-action]").forEach(card => {
      card.addEventListener("click", () => {
        const action = card.dataset.action;
        if (routes[action]) {
          location.href = routes[action];
        }
      });
    });
    document.querySelectorAll(".dropdown-item").forEach(item => {
      item.onclick = () => {
        const action = item.dataset.action;

        if (action === "Image_analysis") {
          location.href = "/index?open=Image_analysis";
        } else if (routes[action]) {
          location.href = routes[action];
        }
        };
    });

    /* ========= 语言切换 ========= */
    document.getElementById("langSwitch").onclick = () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      localStorage.setItem("lang", currentLang);
      renderLang(currentLang);
    };

    const pages = {
      xyTrajectory: "../IDPointAnalysis/XYTrajectory.html",
      xSignal: "../IDPointAnalysis/XSignal.html",
      ySignal: "../IDPointAnalysis/YSignal.html",
      xInstantFrequency: "../IDPointAnalysis/XInstantFrequency.html",
      yInstantFrequency: "../IDPointAnalysis/YInstantFrequency.html",
      splitTrajectory: "../IDPointAnalysis/SplitTrajectory.html",
    };

    document.querySelector(".content-lift").addEventListener("click", function (e) {

      const card = e.target.closest(".item-card");
      
      if (!card) return;

      const action = card.dataset.action;

      if (pages[action]) {
        window.location.href = pages[action];
      }
    });


    // UI 元素
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const uploadStatus = document.getElementById('uploadStatus');
    const downloadBtn = document.getElementById('downloadBtn');
    const idSelect = document.getElementById('idSelect');
    const generateBtn = document.getElementById('generateBtn');
    const chartNote = document.getElementById('chartNote');

    // globals
    let excelData = null;
    let chartInstance = null;
    let processedResult = null; // {id, meanFx, meanFy}

    // 点击选择文件
    selectFileBtn.addEventListener('click', ()=> fileInput.click());
    uploadArea.addEventListener('click', ()=> fileInput.click());

    // 拖拽
    uploadArea.addEventListener('dragover', e=>{ e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', ()=> uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', function(e){
      e.preventDefault(); uploadArea.classList.remove('drag-over');
      if (e.dataTransfer.files.length>0) {
        const file = e.dataTransfer.files[0];
        if (/\.(xlsx|xls|csv)$/i.test(file.name)) handleFileUpload(file);
        else showStatus('Please select an Excel file!','error');
      }
    });

    // 选择文件后处理
    fileInput.addEventListener('change', function(e){
      if (e.target.files.length>0) handleFileUpload(e.target.files[0]);
    });

    function showStatus(message, status){
      uploadStatus.innerHTML = `<p class="${status}">${message}</p>`;
      uploadStatus.className = 'upload-status ' + (status||'');
    }

    function handleFileUpload(file){
      if (!/\.(xlsx|xls|csv)$/i.test(file.name)) { 
        showStatus('Please select an Excel file!','error'); 
        return; 
      }
      showStatus(
        `file name: ${file.name}<br>file size: ${(file.size/1024/1024).toFixed(2)} MB`,
        'info'
      );
      const reader = new FileReader();
      
      reader.onload = function (ev) {
        let workbook;
        try {
          const data = new Uint8Array(ev.target.result);
          workbook = XLSX.read(data, { type: 'array' });
        } catch (e) {
          showStatus('Failed to read file: ' + e.message, 'error');
          return;
        }

        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, { raw: true });

        if (!json || json.length === 0) {
          showStatus('The table is empty or failed to parse.', 'error');
          return;
        }

        excelData = transformWideToLong(json);
        populateIDSelect();

        showStatus(`Successfully read ${json.length} rows of data, generated ID list.`, 'success');
        downloadBtn.disabled = false;
        generateBtn.disabled = false;
        chartNote.textContent = 'Please select an ID from the dropdown above and click "Generate Chart" to visualize the data.';
      };

      if (file.name.toLowerCase().endsWith('.csv')) reader.readAsBinaryString(file);
      else reader.readAsArrayBuffer(file);
    }
    function transformWideToLong(rows) {
      const out = [];

      rows.forEach(r => {
        const time = Number(r['Time']);
        const frameID = Number(r['frameID']);

        for (let i = 1; i <= 8; i++) {
          const x = Number(r[`centroidX_${i}`]);
          const y = Number(r[`centroidY_${i}`]);

          if ([x, y].some(v => Number.isNaN(v))) continue;

          out.push({
            id: i,
            frameID: frameID,
            time: time,
            x: x,
            y: y,
          });
        }
      });

      return out;
    }


    function populateIDSelect(){
      idSelect.innerHTML = '';
      const keys = Object.keys(excelData[0]).map(k=>k.toLowerCase());
      const norm = {};
      Object.keys(excelData[0]).forEach(k=> norm[k.toLowerCase()] = k);
      if (!norm['id'] || !norm['x'] || !norm['y'] || !norm['time']) {
        showStatus('The table is missing necessary columns.','error');
        generateBtn.disabled = true; 
        downloadBtn.disabled = true; 
        return;
      }
      // collect ids
      const idKey = norm['id'];
      const ids = Array.from(new Set(excelData.map(r=>Number(r[idKey])))).filter(v=>!Number.isNaN(v)).sort((a,b)=>a-b);
      if (ids.length===0) {
        showStatus('No valid ID column data found.','error'); return;
      }
      // add placeholder
      const ph = document.createElement('option'); 
      ph.value=''; 
      ph.textContent='— ID —'; idSelect.appendChild(ph);
      ids.forEach(id=>{
        const opt = document.createElement('option'); 
        opt.value = id; 
        opt.textContent = id; 
        idSelect.appendChild(opt);
      });
    }

    // ---------- 下面是信号处理函数（来自你原始页面，保留逻辑） ----------
    function interp1_linear(xIn, yIn, xOut){
      const yOut = new Float64Array(xOut.length);
      for(let i=0;i<xOut.length;i++){
        const x = xOut[i];
        if(x <= xIn[0]){ yOut[i] = yIn[0]; continue }
        if(x >= xIn[xIn.length-1]){ yOut[i] = yIn[yIn.length-1]; continue }
        let j = 0;
        while(!(xIn[j] <= x && x <= xIn[j+1])) j++;
        const t = (x - xIn[j]) / (xIn[j+1] - xIn[j]);
        yOut[i] = yIn[j] + t*(yIn[j+1] - yIn[j]);
      }
      return Array.from(yOut);
    }
    function movingAvg(data, windowSize){
      const N = data.length;
      const out = new Array(N).fill(0);
      for(let i=0;i<N;i++){
        let sum=0; let count=0;
        for(let k=0;k<windowSize;k++){
          const idx = i-k; if(idx<0) break; sum += data[idx]; count++;
        }
        out[i] = sum/count;
      }
      const out2 = new Array(N).fill(0);
      for(let i=N-1;i>=0;i--){
        let sum=0; let count=0;
        for(let k=0;k<windowSize;k++){
          const idx = i+k; if(idx>=N) break; sum += out[idx]; count++;
        }
        out2[i] = sum/count;
      }
      return out2;
    }
    function findPeaks(vec, minProminence=0){
      const N = vec.length; const peaks=[]; const locs=[];
      for(let i=1;i<N-1;i++){
        if(vec[i] > vec[i-1] && vec[i] > vec[i+1]){
          let leftMin = vec[i];
          for(let L=i;L>=0;L--){ if(vec[L] > vec[i]) break; leftMin = Math.min(leftMin, vec[L]); }
          let rightMin = vec[i];
          for(let R=i;R<N;R++){ if(vec[R] > vec[i]) break; rightMin = Math.min(rightMin, vec[R]); }
          const prom = vec[i] - Math.max(leftMin, rightMin);
          if(prom >= minProminence){ peaks.push(vec[i]); locs.push(i); }
        }
      }
      return {peaks, locs};
    }
    function calcInstantFreq(locsPeaks, locsTroughs, Fs, timeArr){
      const freq = []; const timePts = [];
      for(let i=0;i<locsPeaks.length;i++){
        const peakIdx = locsPeaks[i];
        const validT = locsTroughs.filter(t=>t>peakIdx);
        if(validT.length>0){
          const td = (validT[0] - peakIdx)/Fs;
          if(td>0){ freq.push(1/(2*td)); timePts.push(timeArr[peakIdx]); }
        }
      }
      return {freq, timePts};
    }
    // ---------- end signal functions ----------

    // 生成图表
    generateBtn.addEventListener('click', function(){
      if (!excelData) { showStatus('Please upload an Excel file first.','error'); return; }
      const selectedID = idSelect.value;
      if (!selectedID) { showStatus('Please select an ID.','error'); return; }

      // keys normalization
      const norm = {}; Object.keys(excelData[0]).forEach(k=> norm[k.toLowerCase()] = k);
      const idKey = norm['id'], xKey = norm['x'], yKey = norm['y'], tKey = norm['time'];
      if (!idKey || !xKey || !yKey || !tKey) { showStatus('The table is missing necessary columns.','error'); return; }

      // filter rows for this id
      let rows = excelData.filter(r => String(r[idKey]) === String(selectedID));
      if (rows.length === 0) { showStatus('No data found for the selected ID.','error'); return; }

      // extract and sort by time
      let timeArr = rows.map(r=>Number(r[tKey]));
      let xArr = rows.map(r=>Number(r[xKey]));
      let yArr = rows.map(r=>Number(r[yKey]));
      const idx = timeArr.map((v,i)=>[v,i]).sort((a,b)=>a[0]-b[0]).map(p=>p[1]);
      timeArr = idx.map(i=>timeArr[i]); xArr = idx.map(i=>xArr[i]); yArr = idx.map(i=>yArr[i]);

      // time diffs -> resample if non-uniform
      const diffs = []; for(let i=1;i<timeArr.length;i++) diffs.push(timeArr[i]-timeArr[i-1]);
      const meanDiff = diffs.reduce((a,b)=>a+b,0)/Math.max(diffs.length,1);
      const stdDiff = Math.sqrt(diffs.map(d=>(d-meanDiff)*(d-meanDiff)).reduce((a,b)=>a+b,0)/(Math.max(diffs.length-1,1)));
      if (stdDiff > 1e-10 * Math.abs(meanDiff)) {
        const uniformTime = []; const tmin = Math.min(...timeArr), tmax = Math.max(...timeArr); const L = timeArr.length;
        for(let k=0;k<L;k++) uniformTime.push(tmin + (tmax-tmin)*k/(L-1));
        xArr = interp1_linear(timeArr, xArr, uniformTime);
        yArr = interp1_linear(timeArr, yArr, uniformTime);
        timeArr = uniformTime;
      }
      
      // Fs
      const Fs = 1/((timeArr[1]-timeArr[0])||1);

      // filter
      const windowSize = 5;
      const xFilt = movingAvg(xArr, windowSize);
      const yFilt = movingAvg(yArr, windowSize);

      // peak/trough detection
      const stdX = (function(a){const m=a.reduce((s,v)=>s+v,0)/a.length; return Math.sqrt(a.map(v=> (v-m)*(v-m)).reduce((s,v)=>s+v,0)/a.length);} )(xFilt);
      const stdY = (function(a){const m=a.reduce((s,v)=>s+v,0)/a.length; return Math.sqrt(a.map(v=> (v-m)*(v-m)).reduce((s,v)=>s+v,0)/a.length);} )(yFilt);
      const minPromX = 0.5 * stdX; const minPromY = 0.5 * stdY;
      const peaksX = findPeaks(xFilt, minPromX); const peaksY = findPeaks(yFilt, minPromY);
      const troughsX = findPeaks(xFilt.map(v=>-v), minPromX); const troughsY = findPeaks(yFilt.map(v=>-v), minPromY);

      const fx = calcInstantFreq(peaksX.locs, troughsX.locs, Fs, timeArr);
      const fy = calcInstantFreq(peaksY.locs, troughsY.locs, Fs, timeArr);

      const meanFx = fx.freq.length? (fx.freq.reduce((a,b)=>a+b,0)/fx.freq.length):0;
      const meanFy = fy.freq.length? (fy.freq.reduce((a,b)=>a+b,0)/fy.freq.length):0;

      processedResult = { id: selectedID, meanFx: meanFx, meanFy: meanFy };

      // draw bar chart (two bars)
      const ctx = document.getElementById('frequencyChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['X Average Frequency', 'Y Average Frequency'],
          datasets: [{
            label: 'Average Frequency (Hz)',
            data: [meanFx, meanFy],
            backgroundColor: ['#4e79a7', '#f28e2b']
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display:false } },
          scales: { y: { beginAtZero:true } }
        }
      });

      chartNote.textContent = `ID ${selectedID}: X Average = ${meanFx.toFixed(4)} Hz, Y Average = ${meanFy.toFixed(4)} Hz`;
      showStatus(`Chart generated for ID ${selectedID}. Average frequency: X = ${meanFx.toFixed(4)} Hz, Y = ${meanFy.toFixed(4)} Hz`, 'success');
      downloadBtn.disabled = false;
    });

    // 下载 CSV
    downloadBtn.addEventListener('click', function () {
      if (!chartInstance) {
        showStatus('Please generate a chart first.', 'error');
        return;
      }

      const canvas = document.getElementById('frequencyChart');

      const pngData = canvas.toDataURL('image/png');


      const svg = `
    <svg xmlns="http://www.w3.org/2000/svg"
        width="${canvas.width}"
        height="${canvas.height}">
      <image href="${pngData}"
            width="${canvas.width}"
            height="${canvas.height}" />
    </svg>
    `;

      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8;' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `freq_ID_${processedResult.id}.svg`;
      a.click();

      URL.revokeObjectURL(url);

      showStatus('SVG downloaded successfully.', 'success');
    });

  </script>
</body>
</html>
