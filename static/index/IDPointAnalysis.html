<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Each ID Point Analysis Results - Laboratory</title>
  <link rel="stylesheet" href="../CSS/IDPointAnalysis.css">
</head>

<body>
  <header class="main-header">
    <div class="header-container">
      <nav class="main-navigation">
        <ul class="nav-menu">
          <li class="nav-item" id="nav-analysis">
            <a href="#" class="nav-link">
              <span class="icon">📈</span>
              <span data-i18n="nav.analysis"></span>
            </a>
          </li>

          <li class="nav-item" id="nav-deep">
            <a href="#" class="nav-link">
              <span class="icon">🔍</span>
              <span data-i18n="nav.deep"></span>
            </a>
          </li>

        </ul>
      </nav>

      <button id="langSwitch">EN</button>
    </div>
  </header>
  
  <div class="dropdown-container">

    <div class="dropdown-menu" id="analysis-dropdown">
      <div class="dropdown-item" data-action="videoRecognition" data-i18n="dropdown.recognition"></div>
      <div class="dropdown-item" data-action="idSingle" data-i18n="dropdown.idSingle"></div>
      <div class="dropdown-item" data-action="idAll" data-i18n="dropdown.idAll"></div>
    </div>

    <div class="dropdown-menu" id="deep-dropdown">
      <div class="dropdown-item" data-action="Image_analysis" data-i18n="dropdown.Image_analysis" id="Image_analysisSection"></div>
      <div class="dropdown-item" data-action="sampen" data-i18n="dropdown.sampen"></div>
      <div class="dropdown-item" data-action="rqa" data-i18n="dropdown.rqa"></div>
    </div>

  </div>
  
  <main class="main-content">
    <section class="content-section">
      <h2 data-i18n="idPointAnalysis.title"></h2>
      <div class="analysis-options">
        <div class="option-card" data-page="xy-trajectory" data-action="xyTrajectory">
          <h3 data-i18n="idPointAnalysis.xyTrajectory.title"></h3>
          <p data-i18n="idPointAnalysis.xyTrajectory.desc"></p>
        </div>
        <div class="option-card" data-page="x-signal" data-action="xSignal">
          <h3 data-i18n="idPointAnalysis.xSignal.title"></h3>
          <p data-i18n="idPointAnalysis.xSignal.desc"></p>
        </div>
        <div class="option-card" data-page="y-signal" data-action="ySignal">
          <h3 data-i18n="idPointAnalysis.ySignal.title"></h3>
          <p data-i18n="idPointAnalysis.ySignal.desc"></p>
        </div>
        <div class="option-card" data-page="x-instant-frequency" data-action="xInstantFrequency">
          <h3 data-i18n="idPointAnalysis.xInstantFrequency.title"></h3>
          <p data-i18n="idPointAnalysis.xInstantFrequency.desc"></p>
        </div>
        <div class="option-card" data-page="y-instant-frequency" data-action="yInstantFrequency">
          <h3 data-i18n="idPointAnalysis.yInstantFrequency.title"></h3>
          <p data-i18n="idPointAnalysis.yInstantFrequency.desc"></p>
        </div>
        <div class="option-card" data-page="avg-frequency" data-action="avgFrequency">
          <h3 data-i18n="idPointAnalysis.avgFrequency.title"></h3>
          <p data-i18n="idPointAnalysis.avgFrequency.desc"></p>
        </div>
        <div class="option-card" data-page="split-trajectory" data-action="splitTrajectory">
          <h3 data-i18n="idPointAnalysis.splitTrajectory.title"></h3>
          <p data-i18n="idPointAnalysis.splitTrajectory.desc"></p>  
        </div>
      </div>
    </section>
  </main>
  
  <script>
    const i18n = {
      en: {
          nav: {
          analysis: "Data Analysis",
          deep: "In-depth Analysis"
        },
        dropdown: {
          recognition: "Video Recognition",
          idSingle: "Each ID Point's X and Y Analysis",
          idAll: "All ID Point's X and Y Analysis",
          heatmap: "Heat Map",
          sampen: "Sample Entropy",
          Image_analysis: "Image Analysis",
          rqa: "RQA"
        },
        idPointAnalysis: {
          title: "ID Point Analysis Results",
          xyTrajectory: { title: "X-Y Trajectory", desc: "View the X-Y trajectory distribution of the ID point" },
          xSignal: { title: "X Signal", desc: "View the signal change in the X-axis direction" },
          ySignal: { title: "Y Signal", desc: "View the signal change in the Y-axis direction" },
          xInstantFrequency: { title: "X Instantaneous Frequency", desc: "View the instantaneous frequency in the X-axis direction" },
          yInstantFrequency: { title: "Y Instantaneous Frequency", desc: "View the instantaneous frequency in the Y-axis direction" },
          avgFrequency: { title: "Average Frequency Comparison", desc: "View average frequency comparison analysis" },
          splitTrajectory: { title: "Split Trajectory", desc: "View split trajectory diagram" }
        }
      },
      zh: {
        nav: {
          analysis: "数据分析",
          deep: "深度分析"
        },
        dropdown: {
          recognition: "视频识别",
          idSingle: "每个ID点的X和Y分析结果",
          idAll: "所有ID点X和Y的分析结果",
          heatmap: "热力图",
          sampen: "样本熵",
          Image_analysis: "图像分析",
          rqa: "RQA"
        },
        idPointAnalysis: {
          title: "每个ID点的X和Y分析结果",
          xyTrajectory: { title: "X-Y轨迹图", desc: "查看ID点的X-Y轨迹分布图" },
          xSignal: { title: "X信号", desc: "查看X轴方向信号变化" },
          ySignal: { title: "Y信号", desc:"查看Y轴方向信号变化" },
          xInstantFrequency:{title:"X瞬时频率",desc:"查看X轴方向瞬时频率"},
          yInstantFrequency:{title:"Y瞬时频率",desc:"查看Y轴方向瞬时频率"},
          avgFrequency:{title:"平均频率对比",desc:"查看平均频率对比分析"},
          splitTrajectory:{title:"分割轨迹图",desc:"查看分割后的轨迹图"}
        }
      }
    };

    function applyI18n(lang) {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const keys = el.dataset.i18n.split(".");
        let value = i18n[lang];
        keys.forEach(k => value = value?.[k]);
        if (value) el.textContent = value;
      });
      langSwitch.textContent = lang === "zh" ? "EN" : "中";
    }

    let currentLang = localStorage.getItem("lang") || "en";
    applyI18n(currentLang);

    langSwitch.addEventListener("click", () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      localStorage.setItem("lang", currentLang);
      applyI18n(currentLang);
    });
    const navMap = {
      "nav-analysis": "analysis-dropdown",
      "nav-deep": "deep-dropdown"
    };

    function hideAllDropdowns() {
      Object.values(navMap).forEach(id => {
        document.getElementById(id).style.display = "none";
      });
    }

    Object.entries(navMap).forEach(([navId, dropId]) => {
      document.getElementById(navId).addEventListener("click", e => {
        e.preventDefault();
        e.stopPropagation();
        hideAllDropdowns();
        document.getElementById(dropId).style.display = "block";
      });
    });

    document.querySelectorAll(".dropdown-menu").forEach(menu => {
      menu.addEventListener("click", e => e.stopPropagation());
    });

    document.addEventListener("click", hideAllDropdowns);

    const routes = {
      videoRecognition: "../index/VideoRecognition.html",
      idSingle: "../index/IDPointAnalysis.html",
      idAll: "../index/AllIDPointAnalysis.html",
      heatmap: "../index/HeatMap.html",
      sampen: "../DeepAnalysis/SampleEntropy.html",
      Image_analysis: "{{ url_for('index') }}",
      rqa: "../DeepAnalysis/RQA.html",
      splitTrajectory: "../IDPointAnalysis/SplitTrajectory.html",
      xyTrajectory: "../IDPointAnalysis/XYTrajectory.html",
      xSignal: "../IDPointAnalysis/XSignal.html",
      ySignal: "../IDPointAnalysis/YSignal.html",
      xInstantFrequency: "../IDPointAnalysis/XInstantFrequency.html",
      yInstantFrequency: "../IDPointAnalysis/YInstantFrequency.html",
      avgFrequency: "../IDPointAnalysis/AvgFrequency.html"

    
    };
  document.querySelectorAll(".option-card[data-action]").forEach(card => {
  card.addEventListener("click", () => {
    const action = card.dataset.action;
    if (routes[action]) {
      location.href = routes[action];
    }
  });
});

document.querySelectorAll(".option-card[data-action]").forEach(card => {
  card.addEventListener("click", () => {
    const action = card.dataset.action;
    if (routes[action]) {
      location.href = routes[action];
    }
  });
});
    document.querySelectorAll(".dropdown-item").forEach(item => {
      item.onclick = () => {
        const action = item.dataset.action;

        if (action === "Image_analysis") {
          location.href = "/index?open=Image_analysis";
        } else if (routes[action]) {
          location.href = routes[action];
        }
      };
    });

  </script>
</body>
</html>
