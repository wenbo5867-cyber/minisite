<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Each ID Point Analysis Results - Laboratory</title>
  <link rel="stylesheet" href="../CSS/IDPointAnalysis.css">
</head>
<body>
  <header class="main-header">
    <div class="header-container">
      <nav class="main-navigation">
        <ul class="nav-menu">

          <li class="nav-item" id="nav-analysis">
            <a href="#" class="nav-link">
              <span class="icon">📈</span>
              <span data-i18n="nav.analysis"></span>
            </a>
          </li>

          <li class="nav-item" id="nav-deep">
            <a href="#" class="nav-link">
              <span class="icon">🔍</span>
              <span data-i18n="nav.deep"></span>
            </a>
          </li>

        </ul>
      </nav>

      <button id="langSwitch">EN</button>
    </div>
  </header>
  
  <!-- 下拉选项框 -->
  <div class="dropdown-container">
    <div class="dropdown-menu" id="analysis-dropdown">
      <div class="dropdown-item" data-action="videoRecognition" data-i18n="dropdown.recognition"></div>
      <div class="dropdown-item" data-action="idSingle" data-i18n="dropdown.idSingle"></div>
      <div class="dropdown-item" data-action="idAll" data-i18n="dropdown.idAll"></div>
    </div>

    <div class="dropdown-menu" id="deep-dropdown">
      <div class="dropdown-item" data-action="Image_analysis" data-i18n="dropdown.Image_analysis" id="Image_analysisSection"></div>
      <div class="dropdown-item" data-action="sampen" data-i18n="dropdown.sampen"></div>
      <div class="dropdown-item" data-action="rqa" data-i18n="dropdown.rqa"></div>
    </div>

  </div>
  
  <main class="main-content">
    <section class="content-section">
      <h2 data-i18n="idPointAnalysis.title"></h2>

      <div class="analysis-options">

        <div class="option-card" data-page="trajectory-comparison" data-action="trajectoryComparison">
          <h3 data-i18n="idPointAnalysis.trajectory.title"></h3>
          <p data-i18n="idPointAnalysis.trajectory.desc"></p>
        </div>

        <div class="option-card" data-page="frequency-comparison" data-action="frequencyComparison">
          <h3 data-i18n="idPointAnalysis.frequency.title"></h3>
          <p data-i18n="idPointAnalysis.frequency.desc"></p>
        </div>

        <div class="option-card" data-page="amplitude-comparison" data-action="amplitudeComparison">
          <h3 data-i18n="idPointAnalysis.amplitude.title"></h3>
          <p data-i18n="idPointAnalysis.amplitude.desc"></p>
        </div>

        <div class="option-card" data-page="frequency-amplitude" data-action="frequencyAmplitude">
          <h3 data-i18n="idPointAnalysis.frequencyAmplitude.title"></h3>
          <p data-i18n="idPointAnalysis.frequencyAmplitude.desc"></p>
        </div>

        <div class="option-card" data-page="amplitude-xy" data-action="amplitudeXY">
          <h3 data-i18n="idPointAnalysis.amplitudeXY.title"></h3>
          <p data-i18n="idPointAnalysis.amplitudeXY.desc"></p>
        </div>

        <div class="option-card" data-page="frequency-xy" data-action="frequencyXY">
          <h3 data-i18n="idPointAnalysis.frequencyXY.title"></h3>
          <p data-i18n="idPointAnalysis.frequencyXY.desc"></p>
        </div>

      </div>
    </section>
  </main>
  
  <script>
    const i18n = {
    en: {
      nav: {  
        analysis:"Data Analysis", 
        deep:"In-depth Analysis" 
      },
      dropdown: { 
        upload:"Upload Video", 
        clip:"Video Editing", 
        recognition:"Video Recognition",
        idSingle: "Each ID Point's X and Y Analysis",
        idAll: "All ID Point's X and Y Analysis",
        heatmap:"Heat Map",
        sampen:"Sample Entropy", 
        Image_analysis:"Image Analysis", 
        rqa:"RQA" 
      },
      idPointAnalysis: {
        title: "Each ID Point Analysis Results",
        trajectory: { title:"Trajectory", desc:"Compare the trajectories of all ID points." },
        frequency: { title:"Frequency", desc:"Compare the average frequency of all ID points." },
        amplitude: { title:"Amplitude", desc:"Compare the average amplitude of all ID points." },
        frequencyAmplitude: { title:"Frequency-Amplitude", desc:"Compare frequency-amplitude relationships of all ID points." },
        amplitudeXY: { title:"Amplitude XY", desc:"Compare amplitude XY coordinates of all ID points." },
        frequencyXY: { title:"Frequency XY", desc:"Compare frequency XY coordinates of all ID points." }
      }
    },
    zh: {
      nav: { 
        analysis:"数据分析", 
        deep:"深度分析" 
      },
      dropdown: { 
        upload:"上传视频", 
        clip:"剪辑视频", 
        recognition:"视频识别",
                  
        idSingle: "每个ID点的X和Y分析结果",
        idAll: "所有ID点X和Y的分析结果", 
        heatmap:"热力图",
                  
        sampen:"样本熵", 
        rqa:"RQA", 
        Image_analysis:"图像分析" 
      },
      idPointAnalysis: {
        title: "所有ID点X和Y的分析结果",
        trajectory: { title:"轨迹", desc:"对比所有ID点的运动轨迹。" },
        frequency: { title:"频率", desc:"对比所有ID点的平均频率。" },
        amplitude: { title:"振幅", desc:"对比所有ID点的平均振幅。" },
        frequencyAmplitude: { title:"频率振幅", desc:"对比所有ID点的频率振幅关系。" },
        amplitudeXY: { title:"振幅XY", desc:"对比所有ID点的振幅XY坐标。" },
        frequencyXY: { title:"频率XY", desc:"对比所有ID点的频率XY坐标。" }
      }
    }
  };

  // 语言切换
  function applyI18n(lang){
    document.querySelectorAll("[data-i18n]").forEach(el=>{
      const keys = el.dataset.i18n.split(".");
      let value = i18n[lang];
      keys.forEach(k=> value = value?.[k]);
      if(value) el.textContent = value;
    });
    langSwitch.textContent = lang === "zh" ? "EN" : "中";
  }

  let currentLang = localStorage.getItem("lang") || "zh";
  applyI18n(currentLang);

  langSwitch.addEventListener("click", ()=>{
    currentLang = currentLang === "zh" ? "en" : "zh";
    localStorage.setItem("lang", currentLang);
    applyI18n(currentLang);
  });

  // 下拉菜单逻辑
  const navMap = { "nav-analysis":"analysis-dropdown", "nav-deep":"deep-dropdown" };
  function hideAllDropdowns(){ Object.values(navMap).forEach(id=>document.getElementById(id).style.display="none"); }
  Object.entries(navMap).forEach(([navId, dropId])=>{
    document.getElementById(navId).addEventListener("click", e=>{
      e.preventDefault(); e.stopPropagation();
      hideAllDropdowns();
      document.getElementById(dropId).style.display="block";
    });
  });
  document.querySelectorAll(".dropdown-menu").forEach(menu=>menu.addEventListener("click", e=>e.stopPropagation()));
  document.addEventListener("click", hideAllDropdowns);

  // 页面跳转路由
  const routes = {
    trajectoryComparison:"../AllIDPointAnalysis/TrajectoryComparison.html",
    frequencyComparison:"../AllIDPointAnalysis/FrequencyComparison.html",
    amplitudeComparison:"../AllIDPointAnalysis/AmplitudeComparison.html",
    frequencyAmplitude:"../AllIDPointAnalysis/FrequencyAmplitude.html",
    amplitudeXY:"../AllIDPointAnalysis/AmplitudeXY.html",
    frequencyXY:"../AllIDPointAnalysis/FrequencyXY.html",

    videoRecognition:"../index/VideoRecognition.html",
    idSingle:"../index/IDPointAnalysis.html",
    idAll:"../index/AllIDPointAnalysis.html",
    heatmap:"../index/HeatMap.html",
    sampen:"../DeepAnalysis/SampleEntropy.html",
    Image_analysis: "{{ url_for('index') }}",
    rqa:"../DeepAnalysis/RQA.html"
  };

document.querySelectorAll(".option-card[data-action]").forEach(card => {
  card.addEventListener("click", () => {
    const action = card.dataset.action;
    if (routes[action]) {
      location.href = routes[action];
    }
  });
});
document.querySelectorAll(".dropdown-item").forEach(item => {
  item.onclick = () => {
    const action = item.dataset.action;

    if (action === "Image_analysis") {
      location.href = "/index?open=Image_analysis";
    } else if (routes[action]) {
      location.href = routes[action];
    }
    };
});
  </script>
  </body>
  </html>
