function analyze() {
    const fileInput = document.getElementById('fileInput');
    const selectedID = parseInt(document.getElementById('selectedID').value);
    const maxHz = 5; // 设定最大频率阈值，超过跳过

    if (!fileInput.files.length) {
        alert('Please select an Excel file');
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet, {raw:true});

        if (!jsonData || jsonData.length === 0) {
            alert('Excel file is empty');
            return;
        }

        // ---------- Excel读取修改：宽表转成长表 ----------
        const longData = [];
        jsonData.forEach(row => {
            const time = Number(row.Time);
            const frameID = Number(row.frameID);
            for (let i = 1; i <= 8; i++) {
                const x = Number(row[`centroidX_${i}`]);
                const y = Number(row[`centroidY_${i}`]);
                if (isNaN(x) || isNaN(y)) continue; // 跳过无效点
                longData.push({
                    id: i,
                    frameID,
                    time,
                    x,
                    y
                });
            }
        });

        // 获取所有可用 ID
        const uniqueIDs = [...new Set(longData.map(d => d.id))].sort((a,b)=>a-b);
        if (!uniqueIDs.includes(selectedID)) {
            alert('ID does not exist');
            return;
        }

        const analyzeIDs = uniqueIDs.filter(id => id <= selectedID);

        // ---------- 准备绘图数据 ----------
        const combinedFreq = [];
        const combinedAmp = [];

        analyzeIDs.forEach(id => {
            const idData = longData.filter(d => d.id === id);
            if (idData.length < 5) return; // 数据太少，跳过

            const timeArr = idData.map(d => d.time);
            const xArr = idData.map(d => d.x);
            const yArr = idData.map(d => d.y);

            const Fs = 1 / averageDiff(timeArr);

            const xFiltered = smooth(xArr, 5);
            const yFiltered = smooth(yArr, 5);

            const maxHz = 5; // 允许的最大频率
            const meanFreqX = calcMeanFreq(xFiltered, Fs, maxHz);
            const meanFreqY = calcMeanFreq(yFiltered, Fs, maxHz);

            const meanFreq = average([meanFreqX, meanFreqY]);

            // ---------- 如果频率太高就跳过 ----------

            combinedFreq.push(meanFreq);

            const ampX = meanAbsDeviation(xFiltered);
            const ampY = meanAbsDeviation(yFiltered);
            combinedAmp.push(average([ampX, ampY]));
        });

        if (combinedFreq.length === 0) {
            alert('No valid ID points meet the frequency condition');
            return;
        }

        // ---------- 绘制散点图 ----------
        const trace = {
            x: combinedFreq,
            y: combinedAmp,
            mode: 'markers+text',
            type: 'scatter',
            text: analyzeIDs.map(id => 'ID ' + id),
            textposition: 'top right',
            marker: { size: 12, color: combinedFreq, colorscale: 'Turbo', showscale: true }
        };

        Plotly.newPlot('plot', [trace], {
          title: 'Frequency-Amplitude Relationship for ID Points',
          xaxis: { title: 'Average Frequency (Hz)' },
          yaxis: { title: 'Average Amplitude' }
      }).then(() => {
          plotReady = true;
          document.getElementById('downloadBtn').disabled = false;
      });
    };

    reader.readAsArrayBuffer(fileInput.files[0]);
}

// ---------- 工具函数 ----------
function averageDiff(arr){
    const diffs = [];
    for(let i=1;i<arr.length;i++) diffs.push(arr[i]-arr[i-1]);
    return diffs.reduce((a,b)=>a+b,0)/Math.max(diffs.length,1);
}

function average(arr){
    if(!arr.length) return 0;
    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function smooth(arr, windowSize){
    const out = [];
    for(let i=0;i<arr.length;i++){
        let sum=0, count=0;
        for(let j=i;j>i-windowSize && j>=0;j--){
            sum += arr[j]; count++;
        }
        out.push(sum/count);
    }
    return out;
}

// 计算频率峰值的简化示例
function calcMeanFreq(signal, Fs, maxFreq = null){
    const freqArr = calcFreq(signal, Fs); // 原来的峰值法计算瞬时频率
    let filteredFreqs = freqArr;

    if(maxFreq !== null){
        // 过滤掉超过阈值的频率
        filteredFreqs = freqArr.filter(f => f <= maxFreq);
    }

    // 返回平均频率，如果没有有效频率，返回0
    return filteredFreqs.length ? average(filteredFreqs) : 0;
}
function calcFreq(signal, Fs){
    const peaks = [];
    for(let i=1;i<signal.length-1;i++){
        if(signal[i] > signal[i-1] && signal[i] > signal[i+1]){
            peaks.push(i);
        }
    }

    const freq = [];
    for(let i=0;i<peaks.length-1;i++){
        const dt = (peaks[i+1]-peaks[i])/Fs;
        if(dt>0) freq.push(1/dt);
    }

    // 如果没有有效峰值，返回空数组
    return freq;
}


function meanAbsDeviation(arr){
    const mean = average(arr);
    return average(arr.map(v=>Math.abs(v-mean)));
}

function findPeaks(arr) {
    const peaks = [];
    for (let i=1;i<arr.length-1;i++) {
        if (arr[i] > arr[i-1] && arr[i] > arr[i+1]) peaks.push(i);
    }
    return peaks;
}
