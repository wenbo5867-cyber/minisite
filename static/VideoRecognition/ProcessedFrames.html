<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processed Frames - Laboratory</title>
  <link rel="stylesheet" href="../CSS/001.css">
  <link rel="stylesheet" href="../CSS/VideoRecognition/ProcessedFrames.css">

  <!-- JSZip & FileSaver -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
  <!-- 视频黑框 -->

    body { font-family: Arial; margin-top: 120px; }
    #canvas { border:1px solid black; cursor:crosshair; }

  </style>
</head>

<body>
  <header class="main-header">
    <div class="header-container">
      <nav class="main-navigation">
        <ul class="nav-menu">

          <li class="nav-item" id="data-analysis">
            <a href="#" class="nav-link">

              <span class="text" data-i18n="nav_analysis"></span>
            </a>
          </li>

          <li class="nav-item" id="deep-analysis">
            <a href="#" class="nav-link">
              <span class="icon">🔍</span>
              <span class="text" data-i18n="nav_deep"></span>
            </a>
          </li>
        </ul>
      </nav>

      <button id="langSwitch" style="margin-left:20px;">EN</button>
    </div>
  </header>

  <div class="dropdown-container">

    <div class="dropdown-menu" id="analysis-dropdown">
      <div class="dropdown-item" data-action="videoRecognition" data-i18n="video_recognition"></div>
      <div class="dropdown-item" data-action="idSingle" data-i18n="id_single"></div>
      <div class="dropdown-item" data-action="idAll" data-i18n="id_all"></div>
    </div>

    <div class="dropdown-menu" id="deep-dropdown">
      <div class="dropdown-item" data-action="Image_analysis" data-i18n="Image_analysis" id="Image_analysisSection"></div>
      <div class="dropdown-item" data-action="sampen" data-i18n="sampen"></div>
      <div class="dropdown-item" data-action="rqa" data-i18n="rqa"></div>
    </div>
  </div>

  <main class="main-content"> 

    <section class="content-left">
      <div class="recognition-options">

        <div class="item-card" data-page="unprocessed-frames" data-action="unprocessedFrames">
          <h3 data-i18n="rawFrames"></h3>
        </div>

        <div class="item-card" data-page="processed-frames" data-action="processedFrames">
          <h3 data-i18n="processedFrames" style="color: #1976d2;"></h3>

        </div>

        <div class="item-card" data-page="excel-table" data-action="excelTable">
          <h3 data-i18n="excel"></h3>
        </div>
      </div>
    </section>

    <section class="content-section">
    <input type="file" id="videoInput" accept="video/*" class="upload-btn" style="display:none;"><br><br>
    <label for="videoInput" class="upload-btn">
      <span data-i18n="openVideo" data-action="openVideo"></span>
    </label>
    <video id="video" style="display:none"></video>
    <canvas id="canvas"></canvas>

    <div class="action-section"id="controls">
      <button class="download-btn" id="setStandard" data-i18n="set_standard"  data-action="setStandard"></button>
      <button class="download-btn" id="setPoint" data-i18n="set_point" data-action="setPoint"></button>
      <button class="download-btn" id="startTrack" data-i18n="start_track" data-action="startTrack"></button>
    </div>

    <div class="frames-container" id="progressContainer">
      <progress id="progressBar" value="0" max="1" style="width:400px;"></progress>
      <span id="progressText" style="margin-left:10px;">0%</span>
    </div>
    </section>
  </main>

  

<script>
   const i18n = {
      zh: {
        nav_analysis: "数据分析",
        nav_deep: "深度分析",

        video_recognition: "视频识别",
        id_single: "每个ID点的X和Y分析结果",
        id_all: "所有ID点的X和Y分析结果(总图)",
        heatmap: "热力图",

        sampen: "样本熵",
        Image_analysis: "图像分析",
        rqa: "RQA",
        openVideo: "打开视频", 
        set_standard: "设置标准点",
        set_point: "设置ID点",
        start_track: "开始跟踪并下载ZIP",

        rawFrames: "未处理每一帧图片",
        processedFrames: "处理后每一帧图片",
        excel: "Excel 表格",

      },
      en: {
        nav_analysis: "Data Analysis",
        nav_deep: "In-depth Analysis",

        video_recognition: "Video Recognition",
        id_single: "Single ID X and Y Analysis",
        id_all: "All ID X and Y Analysis(Overall)",
        heatmap: "Heat Map",

        sampen: "Sample Entropy",
        Image_analysis: "Image Analysis",
        rqa: "RQA",
        openVideo: "Open Video",
        set_standard: "Set Standard Point",
        set_point: "Set ID Point",
        start_track: "Start Tracking & Download ZIP",

        rawFrames: "Raw Frames",
        processedFrames: "Processed Frames",
        excel: "Excel Table",
      }
    };

    let currentLang = localStorage.getItem("lang") || "en";

    function renderLang(lang) {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.innerText = i18n[lang][el.dataset.i18n];
      });
      document.getElementById("langSwitch").innerText = lang === "zh" ? "EN" : "中";
    }

    renderLang(currentLang);

    /* ========= 下拉控制 ========= */
    const analysis = document.getElementById("data-analysis");
    const deep = document.getElementById("deep-analysis");

    const ad = document.getElementById("analysis-dropdown");
    const dd = document.getElementById("deep-dropdown");

    function hideAll() {
      ad.style.display = dd.style.display = "none";
    }

    analysis.onclick = e => { 
      hideAll(); 
      e.stopPropagation();
      window.scrollTo({ top: 0, behavior: "smooth" });
      ad.style.display = "block"; 
    };
    deep.onclick = e => { 
      hideAll();
      e.stopPropagation();
      window.scrollTo({ top: 0, behavior: "smooth" });
      dd.style.display = "block"; 
    };

    document.addEventListener("click", e => {
      if (![analysis, deep, ad, dd].some(el => el.contains(e.target))) {
        hideAll();
      }
    });
    window.addEventListener("scroll", () => {
      hideAll();
    });

    /* ========= 路由映射 ========= */
    const routes = {
      videoRecognition: "../index/VideoRecognition.html",
      idSingle: "../index/IDPointAnalysis.html",
      idAll: "../index/AllIDPointAnalysis.html",
      heatmap: "../index/HeatMap.html",
      sampen: "../DeepAnalysis/SampleEntropy.html",
      Image_analysis: "{{ url_for('index') }}",
      rqa: "../DeepAnalysis/RQA.html"
    };

    document.querySelectorAll(".option-card[data-action]").forEach(card => {
      card.addEventListener("click", () => {
        const action = card.dataset.action;
        if (routes[action]) {
          location.href = routes[action];
        }
      });
    });
    document.querySelectorAll(".dropdown-item").forEach(item => {
      item.onclick = () => {
        const action = item.dataset.action;

        if (action === "Image_analysis") {
          location.href = "/index?open=Image_analysis";
        } else if (routes[action]) {
          location.href = routes[action];
        }
        };
    });

    document.getElementById("langSwitch").onclick = () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      localStorage.setItem("lang", currentLang);
      renderLang(currentLang);
    };

    const pages = {
      unprocessedFrames: "../VideoRecognition/UnprocessedFrames.html",
      excelTable: "../VideoRecognition/ExcelTable.html"
    };

    // 监听整个 recognition-options（事件委托）
    document.querySelector(".recognition-options").addEventListener("click", function (e) {
      
      // 找到最近的 .item-card
      const card = e.target.closest(".item-card");
      
      if (!card) return;

      const action = card.dataset.action;

      if (pages[action]) {
        window.location.href = pages[action];
      }
    });

    //======ProcessFrames======
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    let trackingPoints = [];
    const MODE = {
      IDLE: "idle",
      SET_STANDARD: "setStandard",
      SET_POINT: "setPoint"
    };
    let mode = MODE.IDLE;
    let marking = false;
    let standardPoint = null; 

    let startX, startY, rect = null;

    let fps = 60;
    let step = 1/60;
    let frameIndex = 0;

    let zip = null; // ZIP 容器

  // ---------------------- 载入视频 ----------------------
  document.getElementById("videoInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    video.src = URL.createObjectURL(file);        //上传的的视频只能在当前浏览器有效，页面关闭后失效
    video.load();

    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      fps = video.frameRate || 30;
      step = 1 / fps;

      video.currentTime = 0;
    };

    video.onseeked = () => {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    };
  });

  setStandard.onclick = () => {
    if (!video.src) return alert("Please enter video first");
    if (marking) return;

    mode = MODE.SET_STANDARD;
    marking = true;
    console.log("Mode: Set standard point (rectangular selection)");
  };

  setPoint.onclick = () => {
    if (!video.src) return alert("Please enter video first");
    if (!standardPoint) return alert("Please set standard point first!");
    if (marking) return;

    mode = MODE.SET_POINT;
    marking = true;
    console.log("Mode: Set tracking point (click the center of the circle)");
  };

  canvas.addEventListener("mousedown", e => {
    if (!marking) return;

    if (mode === MODE.SET_STANDARD) {
      startX = e.offsetX;
      startY = e.offsetY;

      canvas.onmousemove = ev => drawRect(ev);
    }
  });

  canvas.addEventListener("mouseup", () => {
    if (!marking) return;

    if (mode === MODE.SET_STANDARD) {
      canvas.onmousemove = null;

      if (!rect || rect.w < 10 || rect.h < 10) {
        reset();
        return;
      }

      handleSetStandard(rect);
      reset();
    }
  });

  canvas.addEventListener("click", e => {
    if (!marking) return;
    if (mode !== MODE.SET_POINT) return;

    handleSetPointXY(e.offsetX, e.offsetY);
    reset();
  });

  function drawRect(ev) {
    rect = {
      x: Math.min(startX, ev.offsetX),
      y: Math.min(startY, ev.offsetY),
      w: Math.abs(ev.offsetX - startX),
      h: Math.abs(ev.offsetY - startY)
    };

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "blue";
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
  }
  function handleSetStandard(rect) {

    const imgData = ctx.getImageData(rect.x, rect.y, rect.w, rect.h);

    let src = cv.matFromImageData(imgData);
    let gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    let blur = new cv.Mat();
    cv.GaussianBlur(gray, blur, new cv.Size(9, 9), 1.5);

    let circles = new cv.Mat();
    cv.HoughCircles(
      blur,
      circles,
      cv.HOUGH_GRADIENT,
      1,                    // dp
      rect.w / 2,           // minDist
      100,                  // param1
      30,                   // param2 
      Math.min(rect.w, rect.h) * 0.1, // minRadius
      Math.min(rect.w, rect.h) * 0.5  // maxRadius
    );

    if (circles.cols === 0) {
      alert("No circle detected. Please reselect the standard point.");
      cleanup();
      return;
    }

    const cx = circles.data32F[0];
    const cy = circles.data32F[1];
    const r  = circles.data32F[2];

    const meanGray = computeCircleMean(gray, cx, cy, r);
    avgRadius1 = r

    console.log("Set standard point radius avgRadius1 =", avgRadius1);

    const globalCx = rect.x + cx;
    const globalCy = rect.y + cy;

    standardPoint = {
      center: { x: globalCx, y: globalCy },
      radius: r,
      meanGray
    };

    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(globalCx, globalCy, r, 0, Math.PI * 2);
    ctx.stroke();

    console.log("Standard points have been set", standardPoint);

    cleanup();

    function cleanup() {
      src.delete();
      gray.delete();
      blur.delete();
      circles.delete();
    }
  }

  function handleSetPointXY(x, y) {
    if (!standardPoint) return;

    const k = 1.3; // 半径倍数
    const size = standardPoint.radius * k * 2;

    const rect = {
      x: x - size / 2,
      y: y - size / 2,
      w: size,
      h: size
    };

    const id = prompt("Please enter the point ID:");
    if (!id) return;  

    // 绘制矩形和文字
    ctx.strokeStyle = "green";
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    ctx.fillStyle = "green";
    ctx.font = "16px Arial";
    ctx.fillText(id, rect.x + 5, rect.y + 16);

    // 保存到 trackingPoints
    trackingPoints.push({
      id,
      center: { x, y },
      roi: rect
    });

    console.log("tracking point", id, rect);
  }

  function computeCircleMean(grayMat, cx, cy, r) {
    let sum = 0;
    let count = 0;

    const r2 = r * r;

    for (let y = 0; y < grayMat.rows; y++) {
      for (let x = 0; x < grayMat.cols; x++) {
        const dx = x - cx;
        const dy = y - cy;
        if (dx * dx + dy * dy <= r2) {
          sum += grayMat.ucharPtr(y, x)[0];
          count++;
        }
      }
    }

    return count > 0 ? sum / count : 0;
  }

  function reset() {
    marking = false;
    rect = null;
    canvas.onmousemove = null; 
    mode = MODE.IDLE;
  }

  // ---------------------- Start tracking ----------------------
  document.getElementById("startTrack").onclick = async () => {
    if (trackingPoints.length === 0) {
      alert("Please select at least one tracking point!");
      return;
    }

    zip = new JSZip(); // 新 ZIP 文件
    frameIndex = 0;
    progressBar.value = 0;
    progressText.textContent = "0%";

    document.getElementById("startTrack").disabled = true;

    video.currentTime = 0;

    await video.play().then(() => video.pause());

    const totalFrames = Math.floor(video.duration * fps);

    for (let i = 0; i < totalFrames; i++) {
      await processFrame(i);
      progressBar.value = (i + 1) / totalFrames;
      progressText.textContent = Math.round(progressBar.value * 100) + "%";

      // 前进到下一帧
      video.currentTime = Math.min((i + 1) / fps, video.duration);
      await waitForSeeked();
    }

    await finishZip();
    document.getElementById("startTrack").disabled = false;
  };

  // ---------------------- 等待 video.seeked ----------------------
  function waitForSeeked() {
    return new Promise(resolve => {
      video.onseeked = () => resolve();
    });
  }

  // ---------------------- 处理单帧 ----------------------
  async function processFrame(index) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

    const img = frame; 

    const numSeedPoints = trackingPoints.length;
    const seedPoints = trackingPoints.map(pt => [pt.center.x, pt.center.y]);
    const avgRadius = avgRadius1;
    const roiScaleFactor = 1.3;
    const sigma = 1.5;

    const results = singleFrameDotTracker(img, numSeedPoints, seedPoints, avgRadius, roiScaleFactor, sigma);

    results.globalCentroid.forEach((ptPos, i) => {
      const pt = trackingPoints[i];
      const [x, y] = ptPos;
      const r = results.dotRadius[i];
      const metric = results.dotMetric[i];

      // 可视化
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "lime";
      ctx.font = "16px Arial";
      ctx.fillText(`${pt.id} (r=${r.toFixed(1)})`, x + r + 2, y);

      // 更新 ROI
      pt.center = { x, y };
      pt.roi = { 
        x: x - r * roiScaleFactor, 
        y: y - r * roiScaleFactor, 
        w: r * 2 * roiScaleFactor, 
        h: r * 2 * roiScaleFactor 
      };
    });

    await saveFrameToZip(canvas, index);
  }


  // ---------------------- singleFrameDotTracker ----------------------
  function singleFrameDotTracker(img, numSeedPoints, seedPoints, avgRadius, roiScaleFactor, sigma) {
    const globalCentroid = [];
    const dotRadius = [];
    const dotMetric = [];

    const width = img.width;
    const height = img.height;

    for (let i = 0; i < numSeedPoints; i++) {
      const [cx, cy] = seedPoints[i];

      const roiSize = roiScaleFactor * avgRadius * 2;
      let xStart = Math.max(0, cx - roiSize / 2);
      let yStart = Math.max(0, cy - roiSize / 2);
      xStart = Math.min(xStart, width - roiSize);
      yStart = Math.min(yStart, height - roiSize);

      const roiData = ctx.getImageData(xStart, yStart, roiSize, roiSize);

      const result = generateMaskGaussian(roiData, avgRadius, sigma);

      // 转换为全局坐标
      globalCentroid.push([xStart + result.center[0], yStart + result.center[1]]);
      dotRadius.push(result.radius);
      dotMetric.push(result.confidence);
    }

    return { globalCentroid, dotRadius, dotMetric };
  }


  // ---------------------- JS 版本 generateMaskGaussian ----------------------
  function generateMaskGaussian(roiImageData, avgRadius, sigma) {
    const w = roiImageData.width;
    const h = roiImageData.height;
    const data = roiImageData.data;

    const gray = new Float32Array(w * h);
    for (let i = 0; i < data.length; i += 4) {
      gray[i / 4] = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    }

    const blurred = gaussianBlur(gray, w, h, sigma);

    const threshold = otsuThreshold(blurred);
    const bw = new Uint8ClampedArray(w * h);
    for (let i = 0; i < blurred.length; i++){
      bw[i] = blurred[i] < threshold ? 1 : 0;      
    }

    // 4. 连通区域检测
    const regions = connectedComponents(bw, w, h);

    if (regions.length === 0) {
      return { center: [w/2, h/2], radius: avgRadius, confidence: 0.1 };
    }

    // 5. 圆形度评分
    let bestScore = -Infinity;
    let bestRegion = null;
    regions.forEach(r => {
      const circularity = r.area * (1 - r.eccentricity);
      if (circularity > bestScore) {
        bestScore = circularity;
        bestRegion = r;
      }
    });

    const radius = Math.sqrt(bestRegion.area / Math.PI);
    const confidence = Math.min(bestScore / (Math.PI * avgRadius * avgRadius), 1);

    return { center: bestRegion.centroid, radius, confidence };
  }

  // ---------------------- 高斯模糊 ----------------------
  function gaussianBlur(gray, w, h, sigma) {
    const kernelSize = Math.max(3, Math.floor(sigma*6)|1); // 保证奇数
    const kernel = [];
    const k2 = 2*sigma*sigma;
    let sum=0;
    const half = Math.floor(kernelSize/2);

    for(let y=-half;y<=half;y++){
      for(let x=-half;x<=half;x++){
        const v = Math.exp(-(x*x + y*y)/k2);
        kernel.push(v);
        sum += v;
      }
    }
    for(let i=0;i<kernel.length;i++) kernel[i] /= sum;

    const out = new Float32Array(w*h);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        let val=0, idx=0;
        for(let ky=-half;ky<=half;ky++){
          for(let kx=-half;kx<=half;kx++){
            const xx = Math.min(w-1, Math.max(0, x+kx));
            const yy = Math.min(h-1, Math.max(0, y+ky));
            val += gray[yy*w + xx]*kernel[idx++];
          }
        }
        out[y*w+x]=val;
      }
    }
    return out;
  }

  // ---------------------- Otsu 自适应阈值 ----------------------
  function otsuThreshold(gray){
    const hist = new Array(256).fill(0);
    const total = gray.length;
    for(let i=0;i<gray.length;i++){
      const v = Math.round(Math.min(255, Math.max(0, gray[i])));
      hist[v]++;
    }

    let sum=0;
    for(let t=0;t<256;t++) sum += t*hist[t];

    let sumB=0, wB=0, wF=0, varMax=0, threshold=0;
    for(let t=0;t<256;t++){
      wB += hist[t];
      if(wB===0) continue;
      wF = total-wB;
      if(wF===0) break;
      sumB += t*hist[t];
      const mB = sumB/wB;
      const mF = (sum-sumB)/wF;
      const varBetween = wB*wF*(mB-mF)*(mB-mF);
      if(varBetween>varMax){
        varMax = varBetween;
        threshold = t;
      }
    }
    return threshold;
  }

  // ---------------------- 连通区域检测 ----------------------
  function connectedComponents(bw, w, h){
    const labels = new Int32Array(w*h).fill(0);
    let label=1;
    const regions=[];

    function floodFill(x,y,label){
      const stack=[[x,y]];
      const region={pixels:[], area:0, centroid:[0,0], eccentricity:0};
      while(stack.length){
        const [cx,cy]=stack.pop();
        if(cx<0||cy<0||cx>=w||cy>=h) continue;

        const idx=cy*w+cx;

        if(bw[idx] && labels[idx]===0){
          labels[idx]=label;
          region.pixels.push([cx,cy]);
          region.area++;
          region.centroid[0]+=cx;
          region.centroid[1]+=cy;
          stack.push([cx+1,cy]); stack.push([cx-1,cy]);
          stack.push([cx,cy+1]); stack.push([cx,cy-1]);
        }
      }

      if(region.area>0){
        region.centroid[0]/=region.area;
        region.centroid[1]/=region.area;

        let mu20=0, mu02=0, mu11=0;
        region.pixels.forEach(([x,y])=>{
          const dx = x-region.centroid[0];
          const dy = y-region.centroid[1];
          mu20 += dx*dx;
          mu02 += dy*dy;
          mu11 += dx*dy;
        });
        const a = mu20 + mu02;
        const b = Math.sqrt((mu20-mu02)*(mu20-mu02) + 4*mu11*mu11);
        region.eccentricity = b ? Math.sqrt(1 - (a-b)/(a+b)) : 0;
        regions.push(region);
      }
    }

    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const idx=y*w+x;
        if(bw[idx] && labels[idx]===0) floodFill(x,y,label++);
      }
    }
    return regions;
  }

  // ---------------------- 保存帧 ----------------------
  function saveFrameToZip(canvas, index) {
    return new Promise(resolve => {
      const scale = 0.5;
      const smallCanvas = document.createElement("canvas");
      smallCanvas.width = canvas.width * scale;
      smallCanvas.height = canvas.height * scale;
      const smallCtx = smallCanvas.getContext("2d");

      // 绘制缩放后的图像
      smallCtx.drawImage(canvas, 0, 0, smallCanvas.width, smallCanvas.height);

      // 保存到 ZIP
      smallCanvas.toBlob(blob => {
        const filename = `frame_${String(index).padStart(4, "0")}.png`;
        zip.file(filename, blob);
        resolve();
      }, "image/png");
    });
  }

  // ---------------------- ZIP 导出 ----------------------
  async function finishZip() {
    progressText.textContent = "Compressed ZIP...";
    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, "tracking_frames.zip");
    alert("ZIP download complete!");
  }

</script>
</body>
</html>
